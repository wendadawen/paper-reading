<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>线性层 backward 推导</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
  color: #e2e8f0;
  min-height: 100vh;
  padding: 16px;
  line-height: 1.6;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 20% 30%, rgba(96, 165, 250, 0.08), transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(167, 139, 250, 0.08), transparent 40%);
  pointer-events: none;
  z-index: -1;
}
.container { max-width: 1100px; margin: 0 auto; padding-bottom: 80px; }
h1 {
  text-align: center;
  font-size: 26px;
  background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 16px; }

.stage {
  background: rgba(19, 26, 46, 0.7);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.stage-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #f1f5f9; }
.stage-desc { color: #cbd5e1; font-size: 14px; margin-bottom: 10px; }
.stage-formula {
  background: rgba(10, 14, 26, 0.6);
  padding: 12px 16px;
  border-radius: 6px;
  border-left: 3px solid #60a5fa;
  margin: 10px 0;
  overflow-x: auto;
}

.matrix-area {
  background: rgba(13, 20, 36, 0.6);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 24px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.matrix-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}
.matrix-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.matrix-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
.matrix-name { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 2px; }
.matrix {
  display: grid;
  gap: 2px;
  background: rgba(5, 8, 16, 0.6);
  padding: 4px;
  border-radius: 4px;
  border: 1px solid #2d3a5e;
}
.cell {
  padding: 6px 10px;
  background: rgba(30, 41, 59, 0.6);
  border-radius: 3px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
  text-align: center;
  min-width: 50px;
  color: #e2e8f0;
  transition: all 0.4s ease;
}
.cell.target { border: 1.5px solid #f87171; background: rgba(248, 113, 113, 0.18); }
.cell.highlight {
  background: rgba(96, 165, 250, 0.3) !important;
  box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
  transform: scale(1.05);
}
.op { font-size: 18px; color: #64748b; font-weight: 300; }

.derivation {
  background: rgba(19, 26, 46, 0.7);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 16px 22px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.deriv-title { font-size: 14px; font-weight: 700; color: #fbbf24; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.deriv-step {
  margin: 12px 0;
  padding: 10px 14px;
  background: rgba(13, 20, 36, 0.6);
  border-radius: 6px;
  border-left: 2px solid #fbbf24;
}
.deriv-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
.deriv-note { font-size: 13px; color: #94a3b8; margin-top: 6px; font-style: italic; }

.calc {
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
  color: #cbd5e1;
  margin: 4px 0;
  padding-left: 16px;
}
.calc .num { color: #fbbf24; font-weight: 600; }
.calc .result { color: #34d399; font-weight: 600; }
.calc .mark { color: #64748b; }

.compare { display: flex; gap: 16px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.compare-card {
  background: rgba(13, 20, 36, 0.6);
  padding: 10px 18px;
  border-radius: 6px;
  border: 1px solid #2d3a5e;
  text-align: center;
  min-width: 110px;
}
.compare-card .label { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
.compare-card .value { font-family: "SF Mono", Menlo, monospace; font-size: 20px; font-weight: 700; }
.compare-card.old .value { color: #f87171; }
.compare-card.new .value { color: #84cc16; }

.tip {
  background: rgba(96, 165, 250, 0.08);
  border-left: 3px solid #60a5fa;
  padding: 10px 14px;
  border-radius: 6px;
  margin-top: 10px;
  font-size: 13px;
  color: #cbd5e1;
}
.tip.warning { background: rgba(251, 191, 36, 0.08); border-left-color: #fbbf24; }
.tip.success { background: rgba(132, 204, 22, 0.08); border-left-color: #84cc16; }

/* 数学约定表格 */
.convention {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 8px;
  margin-top: 10px;
}
.conv-item {
  background: rgba(13, 20, 36, 0.5);
  padding: 8px 14px;
  border-radius: 6px;
  border-left: 2px solid #60a5fa;
  font-size: 14px;
  color: #cbd5e1;
}
.conv-item .conv-sym {
  font-family: "SF Mono", Menlo, monospace;
  font-weight: 600;
  color: #60a5fa;
  margin-right: 8px;
}

.controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(13, 20, 36, 0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid #2d3a5e;
  padding: 12px 20px;
  gap: 16px;
}
.btn {
  background: rgba(96, 165, 250, 0.12);
  color: #60a5fa;
  border: 1px solid rgba(96, 165, 250, 0.35);
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  min-width: 110px;
  transition: all 0.2s;
}
.btn:hover:not(:disabled) {
  background: rgba(96, 165, 250, 0.25);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.indicator { font-size: 14px; color: #94a3b8; min-width: 100px; text-align: center; }
.indicator .current { color: #60a5fa; font-weight: 700; font-size: 16px; }

@media (max-width: 768px) {
  .matrix-row { gap: 8px; }
  .cell { min-width: 40px; padding: 4px 6px; font-size: 11px; }
  .op { font-size: 14px; }
  h1 { font-size: 18px; }
  .convention { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <h1>线性层 Backward 完整推导</h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="stage">
    <div class="stage-title">数学约定</div>
    <div class="stage-desc">backward 推导用到的记号。粗体小写字母是向量，大写斜体是矩阵。</div>
    <div class="convention" id="conv-grid"></div>
  </div>

  <div class="stage" id="stageBox">
    <div class="stage-title" id="sTitle"></div>
    <div class="stage-desc" id="sDesc"></div>
    <div class="stage-formula" id="sFormula"></div>
  </div>

  <div class="matrix-area" id="mArea"></div>

  <div class="derivation" id="derivBox" style="display:none;">
    <div class="deriv-title" id="dTitle"></div>
    <div id="dSteps"></div>
  </div>

  <div class="tip" id="tipBox" style="display:none;"></div>
</div>

<div class="controls">
  <button class="btn" id="prevBtn" onclick="change(-1)">◀ 上一页</button>
  <div class="indicator">第 <span class="current" id="cur">1</span> / <span id="tot">9</span> 页</div>
  <button class="btn" id="nextBtn" onclick="change(1)">下一页 ▶</button>
</div>

<script>
// === 数学渲染辅助 ===
// 把含 $...$ 的字符串渲染到 element，文本部分用 textContent，公式部分用 katex.render
// displayMode: 块级公式 $$...$$ 或 inline $...$
function renderMixed(element, str) {
  element.innerHTML = '';
  // 先按 $$...$$ 切块级
  const parts = str.split(/(\$\$[^$]+\$\$)/g);
  for (const part of parts) {
    if (!part) continue;
    const blockMatch = part.match(/^\$\$([^$]+)\$\$$/);
    if (blockMatch) {
      // 块级公式
      const span = document.createElement('div');
      span.className = 'block-math';
      try {
        katex.render(blockMatch[1], span, { displayMode: true, throwOnError: false });
      } catch (e) {
        span.textContent = blockMatch[1];
      }
      element.appendChild(span);
      continue;
    }
    // inline 公式按 $...$ 切
    const inlineParts = part.split(/(\$[^$]+\$)/g);
    for (const ip of inlineParts) {
      if (!ip) continue;
      const inlineMatch = ip.match(/^\$([^$]+)\$$/);
      if (inlineMatch) {
        const span = document.createElement('span');
        try {
          katex.render(inlineMatch[1], span, { displayMode: false, throwOnError: false });
        } catch (e) {
          span.textContent = inlineMatch[1];
        }
        element.appendChild(span);
      } else {
        // 普通文本，但允许有 <span> 等 HTML 标签
        const wrapper = document.createElement('span');
        wrapper.innerHTML = ip;
        element.appendChild(wrapper);
      }
    }
  }
}
// 单个 display 公式
function renderDisplay(element, latex) {
  try {
    katex.render(latex, element, { displayMode: true, throwOnError: false });
  } catch (e) {
    element.textContent = latex;
  }
}

// === 数据 ===
const x = [1.0, 2.0];
const W = [[0.5, -0.5], [0.2, 0.3], [-0.1, 0.4]];
const b = [0.0, 0.0, 0.0];
const y = 1;
const eta = 0.5;

const z = [
  W[0][0]*x[0] + W[0][1]*x[1] + b[0],
  W[1][0]*x[0] + W[1][1]*x[1] + b[1],
  W[2][0]*x[0] + W[2][1]*x[1] + b[2],
];
const expZ = z.map(v => Math.exp(v));
const sumExp = expZ.reduce((a, b) => a + b, 0);
const p = expZ.map(v => v / sumExp);
const L = -Math.log(p[y]);

const dLdz = p.map((pi, i) => pi - (i === y ? 1 : 0));
const dLdW = dLdz.map(g => [g * x[0], g * x[1]]);
const dLdb = dLdz.slice();

const Wnew = W.map((row, i) => row.map((w, j) => w - eta * dLdW[i][j]));
const bnew = b.map((v, i) => v - eta * dLdb[i]);

const zNew = [
  Wnew[0][0]*x[0] + Wnew[0][1]*x[1] + bnew[0],
  Wnew[1][0]*x[0] + Wnew[1][1]*x[1] + bnew[1],
  Wnew[2][0]*x[0] + Wnew[2][1]*x[1] + bnew[2],
];
const expZnew = zNew.map(v => Math.exp(v));
const sumExpNew = expZnew.reduce((a, b) => a + b, 0);
const pNew = expZnew.map(v => v / sumExpNew);
const LNew = -Math.log(pNew[y]);

const f = v => (v >= 0 ? ' ' : '') + v.toFixed(4);

// === 矩阵 HTML ===
function vec(v, opts = {}) {
  const { hl = -1, tgt = -1 } = opts;
  return '<div class="matrix" style="grid-template-columns: 1fr;">' +
    v.map((val, i) => {
      let extra = '';
      if (i === hl) extra += ' highlight';
      if (i === tgt) extra += ' target';
      return '<div class="cell' + extra + '">' + f(val) + '</div>';
    }).join('') +
    '</div>';
}
function mat(m, opts = {}) {
  const { hl = [] } = opts;
  const cols = m[0].length;
  return '<div class="matrix" style="grid-template-columns: repeat(' + cols + ', 1fr);">' +
    m.flatMap((row, i) =>
      row.map((val, j) => {
        let extra = '';
        if (hl.some(([r, c]) => r === i && c === j)) extra += ' highlight';
        return '<div class="cell' + extra + '">' + f(val) + '</div>';
      }).join('')
    ).join('') +
    '</div>';
}
// label 和 name 都用 $...$ 包 LaTeX
function blk(label, name, html) {
  return '<div class="matrix-block"><div class="matrix-label">' + label + '</div><div class="matrix-name">' + name + '</div>' + html + '</div>';
}
function op(s) { return '<div class="op">' + s + '</div>'; }
// 数值演算行，含 $...$ LaTeX
function calc(latex, value, mark) {
  let html = '<div class="calc">' + latex;
  if (value !== undefined) html += ' = <span class="' + (mark === 'result' ? 'result' : 'num') + '">' + value + '</span>';
  if (mark && mark !== 'result' && mark !== 'num') html += ' <span class="mark">' + mark + '</span>';
  html += '</div>';
  return html;
}

// === 阶段定义 ===
// 所有 LaTeX 都用 $...$ 包裹，渲染时由 renderMixed 处理
const stages = [
  {
    title: '初始：模型与数据',
    desc: '2 维输入 $\\mathbf{x}$，3 类输出的线性分类器。$y=1$ 表示正确类别是第 1 类（下标从 0 起）。',
    formula: '\\mathbf{z} = W\\mathbf{x} + \\mathbf{b}, \\quad \\mathbf{p} = \\text{softmax}(\\mathbf{z}), \\quad L = -\\log p_y',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('输入', '$\\mathbf{x}$', vec(x)) +
        op('×') +
        blk('权重', '$W$', mat(W)) +
        op('+') +
        blk('偏置', '$\\mathbf{b}$', vec(b)) +
        op('→') +
        blk('类别', '$y$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell target">' + y + '</div></div>') +
      '</div>',
    deriv: null,
    tip: '$\\mathbf{x}$ 是输入（给定），$W$ 和 $\\mathbf{b}$ 是参数（待训练），$y$ 是正确类别。训练目标是让 $p_y$ 接近 1。'
  },
  {
    title: '前向 1：线性变换 $\\mathbf{z} = W\\mathbf{x} + \\mathbf{b}$',
    desc: '矩阵-向量乘法。$z_i$ 是 $\\mathbf{x}$ 各分量的加权和，权重来自 $W$ 的第 $i$ 行。',
    formula: 'z_i = \\sum_{j=1}^{2} W_{ij} \\, x_j + b_i, \\quad i = 0, 1, 2',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('权重', '$W$', mat(W, {hl: [[1,0],[1,1]]})) +
        op('×') +
        blk('输入', '$\\mathbf{x}$', vec(x)) +
        op('+') +
        blk('偏置', '$\\mathbf{b}$', vec(b)) +
        op('=') +
        blk('线性输出', '$\\mathbf{z}$', vec(z, {hl: y, tgt: y})) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$z_0 = W_{00} x_0 + W_{01} x_1 + b_0 = 0.5 \\cdot 1 + (-0.5) \\cdot 2 + 0$', f(z[0]), 'result') +
        calc('$z_1 = W_{10} x_0 + W_{11} x_1 + b_1 = 0.2 \\cdot 1 + 0.3 \\cdot 2 + 0$', f(z[1]), '← $y$') +
        calc('$z_2 = W_{20} x_0 + W_{21} x_1 + b_2 = -0.1 \\cdot 1 + 0.4 \\cdot 2 + 0$', f(z[2]), 'result') +
      '</div>',
    deriv: null,
    tip: '$z_1 = 0.8$（$y$ 位置）目前最大，但优势不大。下一步 softmax 变概率。'
  },
  {
    title: '前向 2：softmax $\\mathbf{p} = \\text{softmax}(\\mathbf{z})$',
    desc: 'softmax 把 $\\mathbf{z}$ 归一化为概率分布（各分量非负、和为 1）。',
    formula: 'p_i = \\frac{e^{z_i}}{\\sum_{j=0}^{2} e^{z_j}}',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('z', '', vec(z, {tgt: y})) +
        op('→ exp') +
        blk('$e^{\\mathbf{z}}$', '', vec(expZ)) +
        op('/') +
        blk('$\\sum e^{z_j}$', '', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell">' + f(sumExp) + '</div></div>') +
        op('=') +
        blk('概率', '$\\mathbf{p}$', vec(p, {hl: y, tgt: y})) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$e^{\\mathbf{z}} = [' + expZ.map(v => f(v)).join(', ') + ']$') +
        calc('$\\sum_j e^{z_j} = ' + f(sumExp) + '$') +
        calc('$\\mathbf{p} = [' + p.map(v => f(v)).join(', ') + ']$') +
      '</div>',
    deriv: null,
    tip: '模型给 $y$ 的概率 $p_y = p_1 = ' + f(p[y]) + '$，远低于 1，loss 会很大。'
  },
  {
    title: '前向 3：损失 $L = -\\log p_y$',
    desc: '交叉熵：取 $y$ 位置概率，取负对数。$p_y$ 越接近 1，$L$ 越接近 0；$p_y$ 越接近 0，$L \\to +\\infty$。',
    formula: 'L = -\\log p_y = -\\log \\frac{e^{z_y}}{\\sum_j e^{z_j}}',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('概率', '$\\mathbf{p}$', vec(p, {tgt: y})) +
        op('→') +
        blk('取 $p_y$', '$p_y$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell highlight">' + f(p[y]) + '</div></div>') +
        op('→') +
        op('$-\\log$') +
        op('=') +
        blk('损失', '$L$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell" style="color:#f87171;font-weight:700;font-size:16px;">' + f(L) + '</div></div>') +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$p_y = p_1 = ' + f(p[y]) + '$') +
        calc('$L = -\\log(' + f(p[y]) + ')$', f(L), 'result') +
      '</div>',
    deriv: null,
    tip: '$L = ' + f(L) + '$，模型离正确答案还很远。接下来 backward 算梯度，让 $L$ 下降。'
  },
  {
    title: '反传 1：计算 $\\frac{\\partial L}{\\partial \\mathbf{z}}$',
    desc: '从 $L$ 往左传。先算 $L$ 对 $\\mathbf{z}$ 的梯度。cross_entropy + softmax 有一个优美的合并公式。',
    formula: '\\frac{\\partial L}{\\partial z_k} = p_k - \\delta_{ky}',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('概率', '$\\mathbf{p}$', vec(p, {tgt: y})) +
        op('−') +
        blk('指示函数', '$\\delta_{ky}$', vec([0,1,0], {tgt: y})) +
        op('=') +
        blk('z 的梯度', '$\\frac{\\partial L}{\\partial \\mathbf{z}}$', vec(dLdz, {hl: y, tgt: y})) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\frac{\\partial L}{\\partial z_0} = p_0 - 0 = ' + f(p[0]) + '$', f(dLdz[0]), '(正 → $z_0$ 要变小)') +
        calc('$\\frac{\\partial L}{\\partial z_1} = p_1 - 1 = ' + f(p[1]) + ' - 1$', f(dLdz[1]), '(负 → $z_1$ 要变大) ← $y$') +
        calc('$\\frac{\\partial L}{\\partial z_2} = p_2 - 0 = ' + f(p[2]) + '$', f(dLdz[2]), '(正 → $z_2$ 要变小)') +
      '</div>',
    deriv: {
      title: '推导 $\\frac{\\partial L}{\\partial z_k}$',
      steps: [
        { label: '第 1 步：写出 $L$', math: 'L = -\\log p_y = -\\log \\frac{e^{z_y}}{\\sum_j e^{z_j}}', note: '$L$ 是 $\\mathbf{z}$ 的复合函数，要通过 $\\mathbf{p}$ 传梯度。' },
        { label: '第 2 步：链式法则', math: '\\frac{\\partial L}{\\partial z_k} = \\frac{\\partial L}{\\partial p_y} \\cdot \\frac{\\partial p_y}{\\partial z_k}', note: '$L$ 直接依赖 $p_y$，$p_y$ 依赖所有 $z_k$。' },
        { label: '第 3 步：前半部分', math: '\\frac{\\partial L}{\\partial p_y} = -\\frac{1}{p_y}', note: '因为 $L = -\\log p_y$，对 $p_y$ 求导直接得 $-1/p_y$。' },
        { label: '第 4 步：softmax 的雅可比', math: '\\frac{\\partial p_y}{\\partial z_k} = p_y \\bigl( \\delta_{ky} - p_k \\bigr)', note: 'softmax 标准结果。分两种情况：$k=y$ 时为 $p_y(1-p_y)$；$k \\neq y$ 时为 $-p_y p_k$。' },
        { label: '第 5 步：合并', math: '\\frac{\\partial L}{\\partial z_k} = -\\frac{1}{p_y} \\cdot p_y \\bigl( \\delta_{ky} - p_k \\bigr) = p_k - \\delta_{ky}', note: '$p_y$ 在分子分母相消，留下优雅的公式。' }
      ]
    },
    tip: '梯度符号定方向：负号 = 该分量应增大，正号 = 应减小。$y$ 位置的梯度永远为负（因 $p_y < 1$）。'
  },
  {
    title: '反传 2：计算 $\\frac{\\partial L}{\\partial W}$（链式法则）',
    desc: '继续往左传到 $W$。$\\mathbf{z}$ 依赖 $W$，所以 $\\frac{\\partial L}{\\partial W}$ 通过 $\\frac{\\partial L}{\\partial \\mathbf{z}}$ 和 $\\frac{\\partial \\mathbf{z}}{\\partial W}$ 组合得到。',
    formula: '\\frac{\\partial L}{\\partial W_{ij}} = \\frac{\\partial L}{\\partial z_i} \\cdot x_j',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('z 的梯度', '$\\frac{\\partial L}{\\partial \\mathbf{z}}$', vec(dLdz, {hl: y, tgt: y})) +
        op('×') +
        blk('输入', '$\\mathbf{x}$', '<div class="matrix" style="grid-template-columns: 1fr 1fr;"><div class="cell">' + f(x[0]) + '</div><div class="cell">' + f(x[1]) + '</div></div>') +
        op('=') +
        blk('W 的梯度', '$\\frac{\\partial L}{\\partial W}$', mat(dLdW, {hl: [[1,0],[1,1]]})) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\frac{\\partial L}{\\partial W_{10}} = \\frac{\\partial L}{\\partial z_1} \\cdot x_0 = ' + f(dLdz[1]) + ' \\cdot ' + f(x[0]) + '$', f(dLdW[1][0]), 'num') +
        calc('$\\frac{\\partial L}{\\partial W_{11}} = \\frac{\\partial L}{\\partial z_1} \\cdot x_1 = ' + f(dLdz[1]) + ' \\cdot ' + f(x[1]) + '$', f(dLdW[1][1]), '← target 行') +
        calc('$\\frac{\\partial L}{\\partial W_{00}} = \\frac{\\partial L}{\\partial z_0} \\cdot x_0 = ' + f(dLdz[0]) + ' \\cdot ' + f(x[0]) + '$', f(dLdW[0][0]), 'num') +
        calc('$\\frac{\\partial L}{\\partial W_{21}} = \\frac{\\partial L}{\\partial z_2} \\cdot x_1 = ' + f(dLdz[2]) + ' \\cdot ' + f(x[1]) + '$', f(dLdW[2][1]), 'num') +
      '</div>',
    deriv: {
      title: '推导 $\\frac{\\partial L}{\\partial W_{ij}}$',
      steps: [
        { label: '第 1 步：链式法则', math: '\\frac{\\partial L}{\\partial W_{ij}} = \\sum_{k} \\frac{\\partial L}{\\partial z_k} \\cdot \\frac{\\partial z_k}{\\partial W_{ij}}', note: '$L$ 通过所有 $z_k$ 依赖 $W_{ij}$，要对所有 $k$ 求和。' },
        { label: '第 2 步：$\\mathbf{z}$ 对 $W$ 的偏导', math: 'z_k = \\sum_{l} W_{kl} x_l + b_k \\;\\Rightarrow\\; \\frac{\\partial z_k}{\\partial W_{ij}} = \\delta_{ki} \\cdot x_j', note: '只有 $k=i$ 时 $z_i$ 含 $W_{ij}$，此时系数为 $x_j$。' },
        { label: '第 3 步：代入', math: '\\frac{\\partial L}{\\partial W_{ij}} = \\sum_{k} \\frac{\\partial L}{\\partial z_k} \\cdot \\delta_{ki} \\cdot x_j = \\frac{\\partial L}{\\partial z_i} \\cdot x_j', note: '求和里只有 $k=i$ 这项不为零。' },
        { label: '矩阵形式', math: '\\frac{\\partial L}{\\partial W} = \\frac{\\partial L}{\\partial \\mathbf{z}} \\, \\mathbf{x}^\\top \\in \\mathbb{R}^{3 \\times 2}', note: '外积：$\\frac{\\partial L}{\\partial \\mathbf{z}}$ 是 $3 \\times 1$，$\\mathbf{x}^\\top$ 是 $1 \\times 2$。' }
      ]
    },
    tip: '$y=1$ 行（target 行）的梯度都是负的——$W_{1j}$ 增大会让 $z_1$ 增大，$L$ 减小。$x_1=2$ 比 $x_0=1$ 大，所以 $W_{i1}$ 梯度绝对值更大。'
  },
  {
    title: '反传 3：计算 $\\frac{\\partial L}{\\partial \\mathbf{b}}$',
    desc: '$\\mathbf{b}$ 的梯度推导与 $W$ 类似，但 $\\mathbf{b}$ 的系数是 1，结果更简单。',
    formula: '\\frac{\\partial L}{\\partial b_i} = \\frac{\\partial L}{\\partial z_i}',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('z 的梯度', '$\\frac{\\partial L}{\\partial \\mathbf{z}}$', vec(dLdz, {hl: y, tgt: y})) +
        op('→') +
        blk('b 的梯度', '$\\frac{\\partial L}{\\partial \\mathbf{b}}$', vec(dLdb, {hl: y, tgt: y})) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\frac{\\partial L}{\\partial \\mathbf{b}} = \\frac{\\partial L}{\\partial \\mathbf{z}} = [' + dLdb.map(v => f(v)).join(', ') + ']$') +
      '</div>',
    deriv: {
      title: '推导 $\\frac{\\partial L}{\\partial b_i}$',
      steps: [
        { label: '第 1 步：链式法则', math: '\\frac{\\partial L}{\\partial b_i} = \\sum_{k} \\frac{\\partial L}{\\partial z_k} \\cdot \\frac{\\partial z_k}{\\partial b_i}', note: '$L$ 通过所有 $z_k$ 依赖 $b_i$。' },
        { label: '第 2 步：$\\mathbf{z}$ 对 $\\mathbf{b}$ 的偏导', math: 'z_k = \\sum_{l} W_{kl} x_l + b_k \\;\\Rightarrow\\; \\frac{\\partial z_k}{\\partial b_i} = \\delta_{ki}', note: '只有 $k=i$ 时 $z_i$ 含 $b_i$，且系数为 1。' },
        { label: '第 3 步：代入', math: '\\frac{\\partial L}{\\partial b_i} = \\sum_{k} \\frac{\\partial L}{\\partial z_k} \\cdot \\delta_{ki} = \\frac{\\partial L}{\\partial z_i}', note: '求和里只有 $k=i$ 这项。结论：$\\frac{\\partial L}{\\partial \\mathbf{b}} = \\frac{\\partial L}{\\partial \\mathbf{z}}$。' }
      ]
    },
    tip: '所有梯度已算完。接下来用梯度更新参数。'
  },
  {
    title: '更新：梯度下降 $W \\leftarrow W - \\eta \\frac{\\partial L}{\\partial W}$',
    desc: '沿梯度负方向调整参数。$\\eta = 0.5$ 是学习率。target 行的 $W$ 会被增大，其他行会被减小。',
    formula: 'W \\leftarrow W - \\eta \\frac{\\partial L}{\\partial W}, \\quad \\mathbf{b} \\leftarrow \\mathbf{b} - \\eta \\frac{\\partial L}{\\partial \\mathbf{b}}',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('旧权重', '$W$', mat(W, {hl: [[1,0],[1,1]]})) +
        op('−') +
        blk('学习率×梯度', '$\\eta \\cdot \\frac{\\partial L}{\\partial W}$', mat(dLdW.map(r => r.map(v => v * eta)), {hl: [[1,0],[1,1]]})) +
        op('=') +
        blk('新权重', '$W\'$', mat(Wnew, {hl: [[1,0],[1,1]]})) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$W_{10}: ' + f(W[1][0]) + ' - \\eta \\cdot (' + f(dLdW[1][0]) + ') = ' + f(W[1][0]) + ' - 0.5 \\cdot (' + f(dLdW[1][0]) + ')$', f(Wnew[1][0]), '↑ 增大') +
        calc('$W_{11}: ' + f(W[1][1]) + ' - \\eta \\cdot (' + f(dLdW[1][1]) + ')$', f(Wnew[1][1]), '↑ 增大') +
        calc('$W_{00}: ' + f(W[0][0]) + ' - \\eta \\cdot (' + f(dLdW[0][0]) + ')$', f(Wnew[0][0]), '↓ 减小') +
      '</div>',
    deriv: null,
    tip: 'target 行的 $W$ 增大，其他行的 $W$ 减小。这就是"学习"——参数朝让 $L$ 减小的方向调整。'
  },
  {
    title: '验证：用新参数前向，$L$ 应下降',
    desc: '用更新后的 $W\'$ 和 $\\mathbf{b}\'$ 重新算 $\\mathbf{z} \\to \\mathbf{p} \\to L$，验证 $L$ 是否真的变小。',
    formula: "L' = -\\log p'_y = -\\log \\text{softmax}(W'\\mathbf{x} + \\mathbf{b}')_y",
    matrix: () =>
      '<div class="matrix-row">' +
        blk('新权重', "$W'$", mat(Wnew, {hl: [[1,0],[1,1]]})) +
        op('·x +b =') +
        blk('新 z', "$\\mathbf{z}'$", vec(zNew, {hl: y, tgt: y})) +
        op('→') +
        blk('新 p', "$\\mathbf{p}'$", vec(pNew, {hl: y, tgt: y})) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc("$\\mathbf{z}' = [" + zNew.map(v => f(v)).join(', ') + "]$") +
        calc("$p'_y = p'_1 = " + f(pNew[y]) + '$ (原来 $p_y = ' + f(p[y]) + '$)', undefined, '') +
      '</div>' +
      '<div class="compare">' +
        '<div class="compare-card old"><div class="label">旧 $L$</div><div class="value">' + f(L) + '</div></div>' +
        '<div class="compare-card new"><div class="label">新 $L\'$</div><div class="value">' + f(LNew) + '</div><div class="label" style="margin-top:2px;">↓ ' + f(L - LNew) + '</div></div>' +
      '</div>',
    deriv: null,
    tip: '$L$ 从 ' + f(L) + ' 降到 ' + f(LNew) + '，$p_y$ 从 ' + f(p[y]) + ' 升到 ' + f(pNew[y]) + '。一次训练步完成。'
  }
];

// === 渲染 ===
let cur = -1;

function render(idx) {
  if (idx < 0 || idx >= stages.length || idx === cur) return;
  cur = idx;
  const s = stages[idx];

  // 阶段标题、描述（含 $...$ inline 公式）
  renderMixed(document.getElementById('sTitle'), s.title);
  renderMixed(document.getElementById('sDesc'), s.desc);
  // 阶段公式（display mode）
  renderDisplay(document.getElementById('sFormula'), s.formula);

  // 矩阵区：先 innerHTML，再扫描所有 $...$ 渲染
  const mEl = document.getElementById('mArea');
  mEl.innerHTML = s.matrix();
  // 扫描所有元素，把 $...$ 文本节点替换成 KaTeX
  scanAndRender(mEl);

  // 推导区
  const dBox = document.getElementById('derivBox');
  if (s.deriv) {
    dBox.style.display = 'block';
    renderMixed(document.getElementById('dTitle'), s.deriv.title);
    const dSteps = document.getElementById('dSteps');
    dSteps.innerHTML = '';
    s.deriv.steps.forEach((step, i) => {
      const div = document.createElement('div');
      div.className = 'deriv-step';
      const labelEl = document.createElement('div');
      labelEl.className = 'deriv-label';
      const mathEl = document.createElement('div');
      const noteEl = document.createElement('div');
      noteEl.className = 'deriv-note';
      dSteps.appendChild(div);
      div.appendChild(labelEl);
      div.appendChild(mathEl);
      div.appendChild(noteEl);
      renderMixed(labelEl, step.label);
      renderDisplay(mathEl, step.math);
      renderMixed(noteEl, step.note);
    });
  } else {
    dBox.style.display = 'none';
  }

  // 提示
  const tEl = document.getElementById('tipBox');
  if (s.tip) {
    tEl.style.display = 'block';
    tEl.className = 'tip';
    if (s.title.includes('反传')) tEl.classList.add('warning');
    if (s.title.includes('更新') || s.title.includes('验证')) tEl.classList.add('success');
    renderMixed(tEl, s.tip);
  } else {
    tEl.style.display = 'none';
  }

  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === stages.length - 1;
}

// 扫描元素内所有文本节点，把 $...$ 和 $$...$$ 渲染成 KaTeX
function scanAndRender(root) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let node;
  while (node = walker.nextNode()) {
    textNodes.push(node);
  }
  for (const textNode of textNodes) {
    const text = textNode.nodeValue;
    if (!text || !text.includes('$')) continue;
    // 把文本节点拆成多段：$$...$$ / $...$ / 普通文本
    const frag = document.createDocumentFragment();
    const regex = /(\$\$[^$]+\$\$|\$[^$\n]+\$)/g;
    let lastIdx = 0;
    let match;
    while ((match = regex.exec(text)) !== null) {
      if (match.index > lastIdx) {
        frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
      }
      const m = match[0];
      const span = document.createElement('span');
      try {
        if (m.startsWith('$$')) {
          katex.render(m.slice(2, -2), span, { displayMode: true, throwOnError: false });
        } else {
          katex.render(m.slice(1, -1), span, { displayMode: false, throwOnError: false });
        }
      } catch (e) {
        span.textContent = m;
      }
      frag.appendChild(span);
      lastIdx = match.index + m.length;
    }
    if (lastIdx < text.length) {
      frag.appendChild(document.createTextNode(text.slice(lastIdx)));
    }
    textNode.parentNode.replaceChild(frag, textNode);
  }
}

function change(delta) {
  const n = cur + delta;
  if (n >= 0 && n < stages.length) render(n);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { change(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { change(1);  e.preventDefault(); }
});

document.getElementById('tot').textContent = stages.length;

// 渲染 subtitle
renderMixed(document.getElementById('subtitle'),
  '前向 $z = Wx + b \\to p = \\text{softmax}(z) \\to L = -\\log p_y$ 的完整训练步');

// 渲染数学约定卡片
const conventions = [
  { sym: '$\\mathbf{x}$', desc: '输入向量，$\\mathbb{R}^2$' },
  { sym: '$W$', desc: '权重矩阵，$\\mathbb{R}^{3 \\times 2}$（待训练）' },
  { sym: '$\\mathbf{b}$', desc: '偏置向量，$\\mathbb{R}^3$（待训练）' },
  { sym: '$\\mathbf{z}$', desc: '线性输出 $= W\\mathbf{x} + \\mathbf{b}$，$\\mathbb{R}^3$' },
  { sym: '$\\mathbf{p}$', desc: '概率分布 $= \\text{softmax}(\\mathbf{z})$，$\\mathbb{R}^3$' },
  { sym: '$y$', desc: '正确类别，取值 $\\in \\{0, 1, 2\\}$' },
  { sym: '$L$', desc: '交叉熵损失 $= -\\log p_y$' },
  { sym: '$\\eta$', desc: '学习率 $= 0.5$' },
  { sym: '$\\partial$', desc: '偏导符号。$\\frac{\\partial L}{\\partial W}$ 读作「$L$ 对 $W$ 的偏导」，即 $W$ 变一点 $L$ 会变多少' },
  { sym: '$\\nabla$', desc: '梯度算子。$\\nabla_\\theta L$ 表示 $L$ 对参数 $\\theta$ 的所有偏导组成的向量，指向 $L$ 上升最快的方向' },
  { sym: '$\\delta_{ky}$', desc: 'Kronecker delta：$k = y$ 时为 $1$，否则为 $0$。相当于「指示 $k$ 是不是正确类别」' },
  { sym: '$\\sum$', desc: '求和符号。$\\sum_{j=0}^{2}$ 表示 $j$ 从 $0$ 取到 $2$ 全部加起来' },
  { sym: '$e$', desc: '自然对数底 $\\approx 2.718$。softmax 用 $e^{z_i}$ 把任意实数变成正数' },
  { sym: '$\\log$', desc: '自然对数（以 $e$ 为底）。$\\log p$ 当 $p \\to 0$ 时趋向 $-\\infty$' },
  { sym: '$\\to$', desc: '趋向 / 映射到。$a \\to b$ 表示 $a$ 变成 $b$' }
];
const convGrid = document.getElementById('conv-grid');
conventions.forEach(c => {
  const div = document.createElement('div');
  div.className = 'conv-item';
  div.innerHTML = '<span class="conv-sym">' + c.sym + '</span><span class="conv-desc">' + c.desc + '</span>';
  convGrid.appendChild(div);
});
scanAndRender(convGrid);

// 等 katex 加载完再渲染第一阶段
function tryRender() {
  if (typeof katex !== 'undefined' && katex.render) {
    render(0);
  } else {
    setTimeout(tryRender, 100);
  }
}
tryRender();
</script>
