<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RLHF：从偏好数据到 ChatGPT</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
  color: #e2e8f0;
  min-height: 100vh;
  padding: 16px;
  line-height: 1.6;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 20% 30%, rgba(96, 165, 250, 0.08), transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(167, 139, 250, 0.08), transparent 40%);
  pointer-events: none;
  z-index: -1;
}
.container { max-width: 1100px; margin: 0 auto; padding-bottom: 80px; }
h1 {
  text-align: center;
  font-size: 26px;
  background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 16px; }

.stage {
  background: rgba(19, 26, 46, 0.7);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.stage-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #f1f5f9; }
.stage-desc { color: #cbd5e1; font-size: 14px; margin-bottom: 10px; }
.stage-formula {
  background: rgba(10, 14, 26, 0.6);
  padding: 12px 16px;
  border-radius: 6px;
  border-left: 3px solid #60a5fa;
  margin: 10px 0;
  overflow-x: auto;
}

.matrix-area {
  background: rgba(13, 20, 36, 0.6);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 24px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.matrix-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}
.matrix-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.matrix-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
.matrix-name { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 2px; }
.matrix {
  display: grid;
  gap: 2px;
  background: rgba(5, 8, 16, 0.6);
  padding: 4px;
  border-radius: 4px;
  border: 1px solid #2d3a5e;
}
.cell {
  padding: 6px 10px;
  background: rgba(30, 41, 59, 0.6);
  border-radius: 3px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
  text-align: center;
  min-width: 50px;
  color: #e2e8f0;
  transition: all 0.4s ease;
}
.cell.chosen { border: 1.5px solid #34d399; background: rgba(52, 211, 153, 0.18); }
.cell.rejected { border: 1.5px solid #f87171; background: rgba(248, 113, 113, 0.18); }
.cell.highlight {
  background: rgba(96, 165, 250, 0.3) !important;
  box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
  transform: scale(1.05);
}
.cell.big { font-size: 16px; font-weight: 700; }
.op { font-size: 18px; color: #64748b; font-weight: 300; }

.derivation {
  background: rgba(19, 26, 46, 0.7);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 16px 22px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.deriv-title { font-size: 14px; font-weight: 700; color: #fbbf24; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.deriv-step {
  margin: 12px 0;
  padding: 10px 14px;
  background: rgba(13, 20, 36, 0.6);
  border-radius: 6px;
  border-left: 2px solid #fbbf24;
}
.deriv-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
.deriv-note { font-size: 13px; color: #94a3b8; margin-top: 6px; font-style: italic; }

.calc {
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
  color: #cbd5e1;
  margin: 4px 0;
  padding-left: 16px;
}
.calc .num { color: #fbbf24; font-weight: 600; }
.calc .result { color: #34d399; font-weight: 600; }
.calc .mark { color: #64748b; }

.compare { display: flex; gap: 16px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.compare-card {
  background: rgba(13, 20, 36, 0.6);
  padding: 10px 18px;
  border-radius: 6px;
  border: 1px solid #2d3a5e;
  text-align: center;
  min-width: 110px;
}
.compare-card .label { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
.compare-card .value { font-family: "SF Mono", Menlo, monospace; font-size: 20px; font-weight: 700; }
.compare-card.before .value { color: #f87171; }
.compare-card.after .value { color: #84cc16; }

.tip {
  background: rgba(96, 165, 250, 0.08);
  border-left: 3px solid #60a5fa;
  padding: 10px 14px;
  border-radius: 6px;
  margin-top: 10px;
  font-size: 13px;
  color: #cbd5e1;
}
.tip.warning { background: rgba(251, 191, 36, 0.08); border-left-color: #fbbf24; }
.tip.success { background: rgba(132, 204, 22, 0.08); border-left-color: #84cc16; }

.convention {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 8px;
  margin-top: 10px;
}
.conv-item {
  background: rgba(13, 20, 36, 0.5);
  padding: 8px 14px;
  border-radius: 6px;
  border-left: 2px solid #60a5fa;
  font-size: 14px;
  color: #cbd5e1;
}
.conv-item .conv-sym {
  font-family: "SF Mono", Menlo, monospace;
  font-weight: 600;
  color: #60a5fa;
  margin-right: 8px;
}

.pipeline {
  background: rgba(13, 20, 36, 0.6);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 20px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.pipeline-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
}
.pipeline-step {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid #2d3a5e;
  border-radius: 6px;
  padding: 8px 14px;
  text-align: center;
  min-width: 90px;
}
.pipeline-step.active {
  border-color: #60a5fa;
  background: rgba(96, 165, 250, 0.15);
  box-shadow: 0 0 12px rgba(96, 165, 250, 0.3);
}
.pipeline-step.rm { border-color: #a78bfa; background: rgba(167, 139, 250, 0.15); }
.pipeline-step.policy { border-color: #34d399; background: rgba(52, 211, 153, 0.15); }
.pipeline-arrow {
  color: #64748b;
  font-size: 16px;
}

.controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(13, 20, 36, 0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid #2d3a5e;
  padding: 12px 20px;
  gap: 16px;
}
.btn {
  background: rgba(96, 165, 250, 0.12);
  color: #60a5fa;
  border: 1px solid rgba(96, 165, 250, 0.35);
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  min-width: 110px;
  transition: all 0.2s;
}
.btn:hover:not(:disabled) {
  background: rgba(96, 165, 250, 0.25);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.indicator { font-size: 14px; color: #94a3b8; min-width: 100px; text-align: center; }
.indicator .current { color: #60a5fa; font-weight: 700; font-size: 16px; }

@media (max-width: 768px) {
  .matrix-row { gap: 8px; }
  .cell { min-width: 40px; padding: 4px 6px; font-size: 11px; }
  .op { font-size: 14px; }
  h1 { font-size: 18px; }
  .convention { grid-template-columns: 1fr; }
  .pipeline-row { font-size: 11px; }
  .pipeline-step { min-width: 70px; padding: 6px 8px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>RLHF：从偏好数据到 ChatGPT</h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="stage">
    <div class="stage-title">数学约定</div>
    <div class="stage-desc">RLHF 全程用到的记号。分三组：数据、RM、策略。</div>
    <div class="convention" id="conv-grid"></div>
  </div>

  <div class="stage" id="stageBox">
    <div class="stage-title" id="sTitle"></div>
    <div class="stage-desc" id="sDesc"></div>
    <div class="stage-formula" id="sFormula"></div>
  </div>

  <div class="matrix-area" id="mArea"></div>

  <div class="derivation" id="derivBox" style="display:none;">
    <div class="deriv-title" id="dTitle"></div>
    <div id="dSteps"></div>
  </div>

  <div class="tip" id="tipBox" style="display:none;"></div>
</div>

<div class="controls">
  <button class="btn" id="prevBtn" onclick="change(-1)">◀ 上一页</button>
  <div class="indicator">第 <span class="current" id="cur">1</span> / <span id="tot">12</span> 页</div>
  <button class="btn" id="nextBtn" onclick="change(1)">下一页 ▶</button>
</div>

<script>
// === 数学渲染辅助 ===
function renderMixed(element, str) {
  element.innerHTML = '';
  const parts = str.split(/(\$\$[^$]+\$\$)/g);
  for (const part of parts) {
    if (!part) continue;
    const blockMatch = part.match(/^\$\$([^$]+)\$\$$/);
    if (blockMatch) {
      const span = document.createElement('div');
      try { katex.render(blockMatch[1], span, { displayMode: true, throwOnError: false }); }
      catch (e) { span.textContent = blockMatch[1]; }
      element.appendChild(span);
      continue;
    }
    const inlineParts = part.split(/(\$[^$]+\$)/g);
    for (const ip of inlineParts) {
      if (!ip) continue;
      const inlineMatch = ip.match(/^\$([^$]+)\$$/);
      if (inlineMatch) {
        const span = document.createElement('span');
        try { katex.render(inlineMatch[1], span, { displayMode: false, throwOnError: false }); }
        catch (e) { span.textContent = inlineMatch[1]; }
        element.appendChild(span);
      } else {
        const wrapper = document.createElement('span');
        wrapper.innerHTML = ip;
        element.appendChild(wrapper);
      }
    }
  }
}
function renderDisplay(element, latex) {
  try { katex.render(latex, element, { displayMode: true, throwOnError: false }); }
  catch (e) { element.textContent = latex; }
}
function scanAndRender(root) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let node;
  while (node = walker.nextNode()) textNodes.push(node);
  for (const textNode of textNodes) {
    const text = textNode.nodeValue;
    if (!text || !text.includes('$')) continue;
    const frag = document.createDocumentFragment();
    const regex = /(\$\$[^$]+\$\$|\$[^$\n]+\$)/g;
    let lastIdx = 0, match;
    while ((match = regex.exec(text)) !== null) {
      if (match.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
      const m = match[0];
      const span = document.createElement('span');
      try {
        if (m.startsWith('$$')) katex.render(m.slice(2, -2), span, { displayMode: true, throwOnError: false });
        else katex.render(m.slice(1, -1), span, { displayMode: false, throwOnError: false });
      } catch (e) { span.textContent = m; }
      frag.appendChild(span);
      lastIdx = match.index + m.length;
    }
    if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
    textNode.parentNode.replaceChild(frag, textNode);
  }
}

// === 工具函数 ===
function f(v, n = 4) { return Number(v).toFixed(n); }
function vec(v, opts = {}) {
  const { hl, chosenIdx, rejectedIdx } = opts;
  const cells = v.map((val, i) => {
    let c = 'cell';
    if (chosenIdx !== undefined && i === chosenIdx) c += ' chosen';
    if (rejectedIdx !== undefined && i === rejectedIdx) c += ' rejected';
    if (hl === i) c += ' highlight';
    return '<div class="' + c + '">' + (typeof val === 'number' ? f(val) : val) + '</div>';
  }).join('');
  return '<div class="matrix" style="grid-template-columns: 1fr;">' + cells + '</div>';
}
function blk(label, name, html) {
  return '<div class="matrix-block">' +
    (label ? '<div class="matrix-label">' + label + '</div>' : '') +
    (name ? '<div class="matrix-name">' + name + '</div>' : '') +
    html +
  '</div>';
}
function op(s) { return '<div class="op">' + s + '</div>'; }
function calc(latex, value, mark) {
  let s = '<div class="calc">' + latex;
  if (value !== undefined && value !== null) s += ' = <span class="result">' + value + '</span>';
  if (mark) s += ' <span class="mark">' + mark + '</span>';
  s += '</div>';
  return s;
}

// === 数学约定卡片（按组分类） ===
const CONVENTIONS = [
  // 数据
  { sym: 'x', desc: 'prompt（用户问题），如 "1+1="' },
  { sym: 'y_w', desc: 'chosen（偏好的回答），如 "2"' },
  { sym: 'y_l', desc: 'rejected（不偏好的回答），如 "3"' },
  { sym: 'y \\succ y\'', desc: '$y$ 比 $y\'$ 更受偏好（人类标注）' },
  // RM
  { sym: 'r_\\varphi', desc: '奖励模型（参数 $\\varphi$）。输入 $(x, y)$，输出标量分数' },
  { sym: 'r_w, r_l', desc: '$r_\\varphi(x, y_w)$ 和 $r_\\varphi(x, y_l)$，两个回答的分数' },
  { sym: '\\sigma', desc: 'sigmoid 函数 $\\sigma(t) = 1/(1+e^{-t})$，把实数压到 $(0,1)$' },
  // 策略
  { sym: '\\pi_\\theta', desc: '策略（LLM）。$\\pi_\\theta(a|s)$ 是在 $s$ 下生成 token $a$ 的概率' },
  { sym: '\\pi_{\\theta_{\\text{old}}}', desc: '旧策略（PPO 采样用，固定）' },
  { sym: 'A', desc: 'advantage（优势）。$A = G - V$，action 相对平均的好坏' },
  { sym: 'r_t', desc: 'importance ratio（重要性比率）$= \\pi_\\theta / \\pi_{\\theta_{\\text{old}}}$' },
  { sym: '\\epsilon', desc: 'PPO 的 clip 范围（通常 0.1~0.3，本例 0.2）' },
  // 通用
  { sym: '\\log', desc: '自然对数' },
  { sym: '\\nabla_\\theta', desc: '梯度算子，指向上升最快方向' },
  { sym: '\\mathbb{E}', desc: '期望（均值）。无法直接算时期望用采样估计' },
  { sym: '\\partial', desc: '偏导符号' },
  { sym: '\\sum', desc: '求和符号' },
  { sym: 'e', desc: '自然对数底 $\\approx 2.718$' },
  { sym: '\\eta', desc: '学习率' },
  { sym: '\\to', desc: '趋向 / 映射到' }
];

function renderConventions() {
  const grid = document.getElementById('conv-grid');
  grid.innerHTML = '';
  CONVENTIONS.forEach(c => {
    const item = document.createElement('div');
    item.className = 'conv-item';
    const sym = document.createElement('span');
    sym.className = 'conv-sym';
    item.appendChild(sym);
    const desc = document.createElement('span');
    desc.className = 'conv-desc';
    item.appendChild(desc);
    grid.appendChild(item);
    renderDisplay(sym, c.sym);
    renderMixed(desc, c.desc);
  });
}

// === 统一数值例子 ===
// 场景：教 LLM 做"1+1="这道题
// prompt = "1+1=" (token 1)
// chosen = "2" (token 2)   ← 正确答案
// rejected = "3" (token 3) ← 错误答案
//
// 整个 RLHF 流程：
// 1. 准备偏好数据 (x, y_w, y_l)
// 2. 训 RM：让 r("2") > r("3")
// 3. 用 RM 当环境训 PG：让 π("2") 上升
// 4. 用 PPO 改良 PG：复用旧数据 + clip 保护

const VOCAB_NAMES = ['<pad>', '1+1=', '2', '3'];
const PROMPT_TOK = 1;
const CHOSEN_TOK = 2;
const REJECTED_TOK = 3;

function softmax(z) {
  const e = z.map(v => Math.exp(v));
  const sum = e.reduce((a, b) => a + b, 0);
  return e.map(v => v / sum);
}
function sigmoid(z) { return 1.0 / (1.0 + Math.exp(-z)); }
function clip(x, lo, hi) { return Math.max(lo, Math.min(hi, x)); }

// === Stage 1: RM 数值 ===
const phiBefore = [0.0, 0.0, 0.0, 0.0];
const lrRM = 2.0;
// 梯度: ∂L/∂Δ = -0.5, ∂L/∂φ_2 = -0.5, ∂L/∂φ_3 = 0.5
const gradPhi = [0.0, 0.0, -0.5, 0.5];
const phiAfter = [0.0, 0.0, 1.0, -1.0];

const r_w_before = phiBefore[CHOSEN_TOK];
const r_l_before = phiBefore[REJECTED_TOK];
const delta_before = r_w_before - r_l_before;
const p_before = sigmoid(delta_before);
const loss_before = -Math.log(p_before);

const r_w_after = phiAfter[CHOSEN_TOK];
const r_l_after = phiAfter[REJECTED_TOK];
const delta_after = r_w_after - r_l_after;
const p_after = sigmoid(delta_after);
const loss_after = -Math.log(p_after);

// === Stage 2: PG 数值（用训好的 RM） ===
const thetaOld = [0.5, 0.8, 0.3, 0.1];
const piOld = softmax(thetaOld);
const a = CHOSEN_TOK;
const r_PG = phiAfter[a];  // 1.0
const G_PG = r_PG;
const A_PG = G_PG;
const logPiOld = Math.log(piOld[a]);
const gradLogPi = thetaOld.map((_, i) => (i === a ? 1.0 : 0.0) - piOld[i]);
const gradJ = gradLogPi.map(g => G_PG * g);
const lrPG = 0.5;
const thetaAfterPG = thetaOld.map((t, i) => t + lrPG * gradJ[i]);
const piAfterPG = softmax(thetaAfterPG);
const logPiAfterPG = Math.log(piAfterPG[a]);
const JBefore = G_PG * logPiOld;
const JAfter = G_PG * logPiAfterPG;

// === Stage 3: PPO 数值 ===
const epsilon = 0.2;
const lrPPO = 0.5;
const thetaNewBefore = thetaOld.slice();
const piNewBefore = piOld.slice();
const r_t_before = piNewBefore[a] / piOld[a];
const r_clipped_before = clip(r_t_before, 1 - epsilon, 1 + epsilon);
const L_before = Math.min(r_t_before * A_PG, r_clipped_before * A_PG);

const gradL = thetaNewBefore.map((_, i) =>
  A_PG * r_t_before * ((i === a ? 1.0 : 0.0) - piNewBefore[i])
);
const thetaNewAfter = thetaNewBefore.map((t, i) => t + lrPPO * gradL[i]);
const piNewAfter = softmax(thetaNewAfter);
const r_t_after = piNewAfter[a] / piOld[a];
const r_clipped_after = clip(r_t_after, 1 - epsilon, 1 + epsilon);
const L_after = Math.min(r_t_after * A_PG, r_clipped_after * A_PG);

// === Pipeline 图（根据当前页高亮不同步骤） ===
function pipeline(active) {
  // active: 'data' | 'rm' | 'rl'
  // PG 是 RL 算法的基础，PPO 是 PG 的改良版——都属于「用 RL 训 policy」这一个阶段
  const steps = [
    { key: 'data', label: '偏好数据', cls: '' },
    { key: 'rm', label: 'RM 训练', cls: 'rm' },
    { key: 'rl', label: '用 RL 训 policy', cls: 'policy' },
  ];
  const html = steps.map((s, i) => {
    const isActive = s.key === active ? 'active' : '';
    return '<div class="pipeline-step ' + s.cls + ' ' + isActive + '">' + s.label + '</div>' +
           (i < steps.length - 1 ? '<div class="pipeline-arrow">→</div>' : '');
  }).join('');
  return '<div class="pipeline-row">' + html + '</div>';
}

// === 页面数据 ===
const STAGES = [
  // 1. 为什么需要 RLHF
  {
    title: '为什么需要 RLHF',
    desc: 'SFT 教模型「该说什么」，但「该说什么」没有唯一答案。比如 "1+1=" 可以答 "2"（对），也可以答 "3"（错），甚至 "我不知道"（保守）。SFT 只能模仿一个标准答案，没法教模型「2 比 3 好，3 比 我不知道 好」这种偏好。RLHF 就是来解决这个问题的。',
    formula: '\\text{SFT 学「模仿」，RLHF 学「偏好」}',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('SFT 数据', '$(x, y)$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell">1+1= → 2</div></div>') +
        op('vs') +
        blk('RLHF 数据', '$(x, y_w, y_l)$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell chosen">1+1= → 2 ✓</div><div class="cell rejected">1+1= → 3 ✗</div></div>') +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('SFT：只有一个标准答案，模型模仿它') +
        calc('RLHF：给两个答案，标出谁更好，模型学偏好') +
      '</div>',
    deriv: {
      title: 'RLHF 的三步',
      steps: [

  {

  // 3. 偏好数据

  // 4. RM：为什么需要
  {
    title: '② RM：为什么需要打分器',
    desc: '人工标注太贵，每条都要人看一遍。RL 要训 policy 需要大量 reward 信号——每次 policy 生成一个回答都要打分。解决方案：训一个 RM 模仿人工判断，之后批量给任意 (prompt, 回答) 打分。',
    formula: 'r_\\varphi(x, y) \\approx \\text{人工判断的「$y$ 在 $x$ 下好不好」}',
    matrix: () =>
      pipeline('rm') +
      '<div class="matrix-row" style="margin-top:20px;">' +
        blk('少量人工<br>偏好数据', '$\\mathcal{D}$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell highlight">~10万条</div></div>') +
        op('训练') +
        blk('RM', '$r_\\varphi$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big">打分器</div></div>') +
        op('批量打分') +
        blk('大量<br>(x, y) 分数', '$r_\\varphi(x,y)$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big">~百万次</div></div>') +
      '</div>',
    deriv: {
      title: 'RM 的核心问题',
      steps: [
        { label: '问题', math: 'r_\\varphi(x, y) = ?', note: '给定 (prompt, 回答)，输出一个标量分数。怎么训？' },
        { label: '线索', math: 'y_w \\succ y_l', note: '我们知道 chosen 比 rejected 好，但不知道「好多少」。只能学相对排序，不是绝对分数。' },
        { label: '解决', math: 'P(y_w \\succ y_l) = \\sigma(r_w - r_l)', note: '把「$y_w$ 比 $y_l$ 好」建模成概率，用 BT 模型（下一页）。' }
      ]
    },
    tip: 'RM 学的是相对排序：r("2") > r("3")。绝对值不重要，差值才重要。'
  },

  // 5. RM：Bradley-Terry
  {
    title: '② RM：Bradley-Terry 模型',
    desc: '把「$y_w$ 比 $y_l$ 更受偏好」建模成概率。BT 模型：两个分数的差过 sigmoid = 偏好概率。这是把「打分」变成「偏好概率」的标准做法。',
    formula: 'P(y_w \\succ y_l | x) = \\sigma\\left(r_\\varphi(x, y_w) - r_\\varphi(x, y_l)\\right)',
    matrix: () =>
      pipeline('rm') +
      '<div class="matrix-row" style="margin-top:20px;">' +
        blk('chosen 分数', '$r_w$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell chosen big">?</div></div>') +
        op('−') +
        blk('rejected 分数', '$r_l$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell rejected big">?</div></div>') +
        op('=') +
        blk('差值', '$\\Delta$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell highlight big">?</div></div>') +
        op('→ $\\sigma$ →') +
        blk('偏好概率', '$P$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big">?</div></div>') +
      '</div>',
    deriv: {
      title: '为什么是 sigmoid 差',
      steps: [
        { label: 'BT 原始定义', math: 'P(y_w \\succ y_l) = \\frac{r(y_w)}{r(y_w) + r(y_l)}', note: '把 reward 当「强度」，强度大的赢概率大。要求 $r > 0$。' },
        { label: '换元', math: 'r(y) = e^{s(y)}', note: '指数函数保证 $r > 0$。$s(y)$ 可以是任意实数（可负）。' },
        { label: '代入', math: 'P = \\frac{e^{s_w}}{e^{s_w} + e^{s_l}} = \\frac{1}{1 + e^{s_l - s_w}}', note: '上下同除 $e^{s_w}$。' },
        { label: 'sigmoid 形式', math: 'P = \\sigma(s_w - s_l)', note: '这就是 RM 用的形式：分数差过 sigmoid = 偏好概率。$\\Delta = 0$ 时 $P = 0.5$（中性）；$\\Delta > 0$ 时 $P > 0.5$（偏好 chosen）。' }
      ]
    },
    tip: 'sigmoid 把「分数差」变成「偏好概率」。差越大，概率越接近 1（强烈偏好）；差为 0，概率 0.5（无偏好）。'
  },

  // 6. RM：loss + 训练
  {
    title: '② RM：损失与训练',
    desc: '用最大似然：让 RM 给「$y_w \\succ y_l$」这个观测赋高概率。最大化 $\\log P$ 等价于最小化 $-\\log P$。这就是 RM 的 loss。训练前 $\\varphi = [0,0,0,0]$，$\\Delta = 0$，$P = 0.5$，loss = 0.6931。',
    formula: '\\mathcal{L}_{RM} = -\\log \\sigma(\\Delta), \\quad \\Delta = r_w - r_l',
    matrix: () =>
      pipeline('rm') +
      '<div class="matrix-row" style="margin-top:20px;">' +
        blk('RM 参数<br>（每个 token 一个分数）', '$\\varphi$', vec(phiBefore, { chosenIdx: CHOSEN_TOK, rejectedIdx: REJECTED_TOK })) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$r_w = \\varphi_{\\text{2}} = ' + f(r_w_before) + '$', '', 'chosen') +
        calc('$r_l = \\varphi_{\\text{3}} = ' + f(r_l_before) + '$', '', 'rejected') +
        calc('$\\Delta = r_w - r_l = ' + f(delta_before) + '$') +
        calc('$\\sigma(\\Delta) = ' + f(p_before) + '$', '', '中性') +
        calc('$\\mathcal{L}_{RM} = -\\log \\sigma(\\Delta) = ' + f(loss_before) + '$', f(loss_before), 'result ← 训练前') +
      '</div>',
    deriv: {
      title: '梯度推导',
      steps: [
        { label: '设 $u = \\Delta$', math: 'u = r_w - r_l', note: '$\\mathcal{L} = -\\log \\sigma(u)$。' },
        { label: '对 $u$ 求导', math: '\\frac{d\\mathcal{L}}{du} = \\sigma(u) - 1', note: 'sigmoid 导数性质 $\\sigma\'(u) = \\sigma(u)(1 - \\sigma(u))$。' },
        { label: '$u$ 对 $r_w, r_l$', math: '\\frac{\\partial u}{\\partial r_w} = 1, \\frac{\\partial u}{\\partial r_l} = -1', note: '$\\Delta = r_w - r_l$。' },
        { label: '组合', math: '\\frac{\\partial \\mathcal{L}}{\\partial r_w} = \\sigma(u) - 1, \\quad \\frac{\\partial \\mathcal{L}}{\\partial r_l} = 1 - \\sigma(u)', note: '训练前 $\\sigma(0) - 1 = -0.5$（chosen 梯度为负→要升），$1 - \\sigma(0) = 0.5$（rejected 梯度为正→要降）。' }
      ]
    },
    tip: '训练前 $\\sigma(\\Delta) = 0.5$ 表示「RM 认为 2 和 3 一样好」——最中性的状态。loss = -log(0.5) = 0.6931。'
  },

  // 7. RM：更新 + 验证
  {
    title: '② RM：一步更新与验证',
    desc: '梯度下降更新参数 $\\varphi$。$r_w$、$r_l$ 是 $\\varphi$ 变了之后重新前向算出来的，不是被公式直接更新。用 $\\eta = 2.0$（为了数值整洁）。',
    formula: '\\varphi^{\\text{new}} = \\varphi^{\\text{old}} - \\eta \\nabla_\\varphi \\mathcal{L}',
    matrix: () =>
      pipeline('rm') +
      '<div class="matrix-row" style="margin-top:20px;">' +
        blk('训练前 $\\varphi$', '$\\varphi^{\\text{old}}$', vec(phiBefore, { chosenIdx: CHOSEN_TOK, rejectedIdx: REJECTED_TOK })) +
        op('− η·∇L') +
        blk('梯度', '$\\nabla_\\varphi \\mathcal{L}$', vec(gradPhi, { chosenIdx: CHOSEN_TOK, rejectedIdx: REJECTED_TOK })) +
        op('=') +
        blk('训练后 $\\varphi$', '$\\varphi^{\\text{new}}$', vec(phiAfter, { chosenIdx: CHOSEN_TOK, rejectedIdx: REJECTED_TOK })) +
      '</div>' +
      '<div class="compare">' +
        '<div class="compare-card before"><div class="label">训练前 loss</div><div class="value">' + f(loss_before) + '</div></div>' +
        '<div class="compare-card after"><div class="label">训练后 loss</div><div class="value">' + f(loss_after) + '</div></div>' +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\varphi_{\\text{2}} = 0 - 2.0 \\times (-0.5) = 1.0$', '', 'chosen 升') +
        calc('$\\varphi_{\\text{3}} = 0 - 2.0 \\times 0.5 = -1.0$', '', 'rejected 降') +
        calc('$r_w = 1.0, r_l = -1.0, \\Delta = 2.0$') +
        calc('$\\sigma(\\Delta) = ' + f(p_after) + '$', '', '偏好概率上升') +
        calc('$\\mathcal{L}^{\\text{after}} = ' + f(loss_after) + '$', f(loss_after), 'result') +
      '</div>',
    deriv: null,
    tip: 'RM 学会了：r("2") = 1.0 > r("3") = -1.0。后面 PPO 就用这个 RM 当环境给 policy 打分。'
  },

  // 8. PG：为什么需要采样
  {
    title: '③ PG：为什么需要采样',
    desc: '现在有了 RM，要训 policy（LLM）让它生成高 reward 的回答。目标：最大化期望 reward $J = \\mathbb{E}[r]$。但期望要遍历所有 action——词表几万 token，不可能直接算。只能用采样估计。',
    formula: 'J(\\theta) = \\mathbb{E}_{a \\sim \\pi_\\theta}[r(a)] \\approx \\frac{1}{N} \\sum_{i=1}^N r(a_i)',
    matrix: () =>
      pipeline('rl') +
      '<div class="matrix-row" style="margin-top:20px;">' +
        blk('policy', '$\\pi_\\theta$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big">LLM</div></div>') +
        op('采样') +
        blk('action', '$a$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell highlight">2</div></div>') +
        op('RM 打分') +
        blk('reward', '$r$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big" style="color:#fbbf24;">' + f(r_PG) + '</div></div>') +
      '</div>',
    deriv: {
      title: '为什么期望算不了',
      steps: [
        { label: '目标', math: 'J = \\sum_a \\pi(a|s) \\cdot r(a)', note: '期望 = 概率 × 值之和。需要遍历所有 action。' },
        { label: '问题', math: '|\\text{vocab}| = 50000+', note: 'LLM 词表几万 token，每个 prompt 都遍历一遍不可能。' },
        { label: '采样估计', math: 'J \\approx \\frac{1}{N} \\sum_{i=1}^N r(a_i), \\quad a_i \\sim \\pi', note: '从 $\\pi$ 采 $N$ 个样本，用平均 reward 估计期望。这是蒙特卡洛方法。' },
        { label: '本例', math: 'N = 1, \\, a = \\text{2}, \\, r = 1.0', note: '教学简化，单样本估计。' }
      ]
    },
    tip: 'PG 的核心：用采样代替求和。期望算不了，但采样几个样本就能估计。代价是有方差——样本可能不准。'
  },

  // 9. PG：策略梯度定理
  {
    title: '③ PG：策略梯度定理',
    desc: 'PG 定理给出 $\\nabla_\\theta J$ 的形式：$G \\cdot \\nabla_\\theta \\log \\pi(a|s)$。关键是 log 技巧——把「算不了的期望」变成「可以采样估计的期望」。',
    formula: '\\nabla_\\theta J = \\mathbb{E}_{a \\sim \\pi_\\theta}\\left[ G \\cdot \\nabla_\\theta \\log \\pi_\\theta(a|s) \\right]',
    matrix: () =>
      pipeline('rl') +
      '<div class="matrix-row" style="margin-top:20px;">' +
        blk('回报', '$G$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big" style="color:#fbbf24;">' + f(G_PG) + '</div></div>') +
        op('×') +
        blk('log 概率梯度', '$\\nabla_\\theta \\log \\pi$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big">见下</div></div>') +
        op('=') +
        blk('目标梯度', '$\\nabla_\\theta J$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big highlight">见下</div></div>') +
      '</div>',
    deriv: {
      title: 'log 技巧：为什么用 log',
      steps: [
        { label: '目标', math: 'J = \\sum_a \\pi(a|s) \\cdot r(a)', note: '期望 = 概率 × 值之和。' },
        { label: '对 $\\theta$ 求导', math: '\\nabla_\\theta J = \\sum_a \\nabla_\\theta \\pi(a|s) \\cdot r(a)', note: '$r(a)$ 不依赖 $\\theta$。' },
        { label: '问题', math: '\\nabla_\\theta \\pi \\text{ 不好算}', note: '直接算 $\\pi$ 对 $\\theta$ 的导数很复杂。' },
        { label: 'log 技巧', math: '\\nabla_\\theta \\pi = \\pi \\cdot \\nabla_\\theta \\log \\pi', note: '因为 $\\nabla \\log f = \\nabla f / f$，所以 $\\nabla f = f \\cdot \\nabla \\log f$。' },
        { label: '代回去', math: '\\nabla_\\theta J = \\sum_a \\pi(a|s) \\cdot \\nabla_\\theta \\log \\pi(a|s) \\cdot r(a)', note: '把 $\\pi$ 凑成期望的形式。' },
        { label: '写成期望', math: '\\nabla_\\theta J = \\mathbb{E}_{a \\sim \\pi}[r(a) \\cdot \\nabla_\\theta \\log \\pi(a|s)]', note: '现在可以用采样估计了——这是 PG 的精髓。' },
        { label: '推广到多步', math: 'r(a) \\to G \\text{ (return)}', note: '单步 $G = r$，多步 $G = \\sum \\gamma^k r_{t+k}$。本例 $G = r = 1.0$。' }
      ]
    },
    tip: 'log 技巧是 PG 的核心：把 $\\nabla_\\theta \\pi$ 转换成 $\\pi \\cdot \\nabla_\\theta \\log \\pi$，从而把求和变成期望，期望可以采样估计。'
  },

  // 10. PG：softmax 梯度 + 更新
  {
    title: '③ PG：softmax 梯度与一步更新',
    desc: 'softmax 策略的 $\\nabla_\\theta \\log \\pi(a|s)_i = \\text{one\\_hot}(a)_i - \\pi_i$。优美公式。然后用 $\\nabla_\\theta J = G \\cdot (\\text{one\\_hot} - \\pi)$ 更新。注意 RL 最大化 $J$，走 $+$ 方向（梯度上升）。',
    formula: '\\nabla_\\theta \\log \\pi(a|s)_i = \\text{one\\_hot}(a)_i - \\pi_i, \\quad \\theta^{\\text{new}} = \\theta^{\\text{old}} + \\eta \\nabla_\\theta J',
    matrix: () =>
      pipeline('rl') +
      '<div class="matrix-row" style="margin-top:20px;">' +
        blk('logits<br>（参数）', '$\\theta$', vec(thetaOld, { chosenIdx: CHOSEN_TOK })) +
        op('→ softmax →') +
        blk('策略', '$\\pi$', vec(piOld, { chosenIdx: CHOSEN_TOK })) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\pi = [' + piOld.map(v => f(v)).join(', ') + ']$') +
        calc('$\\pi(\\text{2}|s) = ' + f(piOld[CHOSEN_TOK]) + '$', '', '采样到的 action') +
        calc('$\\log \\pi = ' + f(logPiOld) + '$') +
        calc('$\\nabla_\\theta \\log \\pi = \\text{one\\_hot}(\\text{2}) - \\pi = [' + gradLogPi.map(v => f(v)).join(', ') + ']$') +
        calc('$\\nabla_\\theta J = G \\cdot \\nabla_\\theta \\log \\pi = [' + gradJ.map(v => f(v)).join(', ') + ']$') +
      '</div>' +
      '<div class="matrix-row" style="margin-top:12px;">' +
        blk('训练前 $\\theta$', '$\\theta^{\\text{old}}$', vec(thetaOld, { chosenIdx: CHOSEN_TOK })) +
        op('+ η·∇J') +
        blk('梯度', '$\\nabla_\\theta J$', vec(gradJ, { chosenIdx: CHOSEN_TOK })) +
        op('=') +
        blk('训练后 $\\theta$', '$\\theta^{\\text{new}}$', vec(thetaAfterPG, { chosenIdx: CHOSEN_TOK })) +
      '</div>' +
      '<div class="compare">' +
        '<div class="compare-card before"><div class="label">训练前 $\\pi(\\text{2})$</div><div class="value">' + f(piOld[CHOSEN_TOK]) + '</div></div>' +
        '<div class="compare-card after"><div class="label">训练后 $\\pi(\\text{2})$</div><div class="value">' + f(piAfterPG[CHOSEN_TOK]) + '</div></div>' +
      '</div>',
    deriv: {
      title: 'softmax log 梯度推导',
      steps: [
        { label: 'softmax', math: '\\pi_i = e^{\\theta_i} / \\sum_j e^{\\theta_j}', note: '标准 softmax。' },
        { label: 'log', math: '\\log \\pi_a = \\theta_a - \\log \\sum_j e^{\\theta_j}', note: '取 log。' },
        { label: '$i = a$', math: '\\partial \\log \\pi_a / \\partial \\theta_a = 1 - \\pi_a', note: '前一项导 1，后一项是 softmax。' },
        { label: '$i \\neq a$', math: '\\partial \\log \\pi_a / \\partial \\theta_i = -\\pi_i', note: '前一项 $\\theta_a$ 和 $\\theta_i$ 无关，导 0。' },
        { label: '合并', math: '\\partial \\log \\pi_a / \\partial \\theta_i = \\text{one\\_hot}_i - \\pi_i', note: '选中位 $1 - \\pi$（正），其他 $-\\pi$（负）。' },
        { label: '梯度上升', math: '\\theta^{\\text{new}} = \\theta^{\\text{old}} + \\eta \\nabla_\\theta J', note: 'RL 最大化 $J$，走 $+$ 方向。监督学习最小化 loss 走 $-$ 方向。本质同一件事，符号约定不同。' }
      ]
    },
    tip: 'PG 一步更新让 $\\pi(\\text{2})$ 从 0.2133 升到 0.3162。policy 学会「在 1+1= 后更倾向输出 2」。'
  },

  // 11. PPO：为什么需要
  {
    title: '③ PPO：为什么需要改良 PG',
    desc: 'PG 的痛点：on-policy——采一次只能更新一次。每次更新后策略变了，旧样本就失效。样本效率低。PPO 是 PG 的改良版：用 importance ratio 让旧样本也能用，用 clip 防止偏太远。',
    formula: '\\text{PPO = PG + importance ratio + clip}',
    matrix: () =>
      pipeline('rl') +
      '<div class="matrix-row" style="margin-top:20px;">' +
        blk('PG', '', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell">采样 → 更新 → 丢弃</div></div>') +
        op('vs') +
        blk('PPO', '', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell highlight">采样 → 多次复用 → 更新</div></div>') +
      '</div>',
    deriv: {
      title: 'PG 的两个痛点',
      steps: [
        { label: '痛点 1', math: '\\text{on-policy: 旧样本失效}', note: '$\\pi_\\theta$ 变了，按 $\\pi_{\\theta_{\\text{old}}}$ 采的样本就不准了。' },
        { label: '解决', math: 'r_t = \\pi_\\theta / \\pi_{\\theta_{\\text{old}}}', note: 'importance ratio 修正分布偏移——下一页详讲。' },
        { label: '痛点 2', math: '\\text{偏太远方差爆炸}', note: '$\\pi_\\theta$ 离 $\\pi_{\\theta_{\\text{old}}}$ 太远，估计方差大，训练不稳定。' },
        { label: '解决', math: '\\text{clip}(r_t, 1-\\epsilon, 1+\\epsilon)', note: '限制 $r_t$ 在 $[1-\\epsilon, 1+\\epsilon]$ 范围内，超出梯度消失——自动刹车。' }
      ]
    },
    tip: 'PG 用一次丢一次太浪费。PPO 让旧样本能复用，但加了 clip 防止策略偏太远。这是 PPO 比 PG 稳的核心原因。'
  },

  // 12. PPO：完整流程
  {
    title: '③ PPO：importance ratio + clip + 完整流程',
    desc: 'PPO 的完整目标 $L^{\\text{CLIP}}$。当 $r_t$ 在 clip 范围内时，梯度形式和 PG 几乎一样，多了 $A$ 和 $r_t$ 两个权重。本例一步更新后 $r_t = 1.48 > 1+\\epsilon = 1.2$，触发 clip——L 被 cap 在 1.2，梯度消失。',
    formula: 'L^{\\text{CLIP}} = \\min\\left(r_t A, \\, \\text{clip}(r_t, 1-\\epsilon, 1+\\epsilon) A\\right)',
    matrix: () =>
      pipeline('rl') +
      '<div class="matrix-row" style="margin-top:20px;">' +
        blk('新策略', '$\\pi_\\theta$', vec(piNewBefore, { chosenIdx: CHOSEN_TOK })) +
        op('÷') +
        blk('旧策略', '$\\pi_{\\theta_{\\text{old}}}$', vec(piOld, { chosenIdx: CHOSEN_TOK })) +
        op('=') +
        blk('比率', '$r_t$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell highlight big">' + f(r_t_before) + '</div></div>') +
        op('×') +
        blk('优势', '$A$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big" style="color:#fbbf24;">' + f(A_PG) + '</div></div>') +
        op('=') +
        blk('目标', '$L$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big" style="color:#84cc16;">' + f(L_before) + '</div></div>') +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('训练前 $\\pi_\\theta = \\pi_{\\theta_{\\text{old}}}$，$r_t = 1$，$L = A = ' + f(L_before) + '$') +
        calc('$\\nabla_\\theta L = A \\cdot r_t \\cdot (\\text{one\\_hot} - \\pi) = [' + gradL.map(v => f(v)).join(', ') + ']$') +
        calc('$\\theta^{\\text{new}} = \\theta^{\\text{old}} + \\eta \\nabla_\\theta L$') +
      '</div>' +
      '<div class="matrix-row" style="margin-top:12px;">' +
        blk('训练前 $\\theta$', '$\\theta^{\\text{old}}$', vec(thetaNewBefore, { chosenIdx: CHOSEN_TOK })) +
        op('+ η·∇L') +
        blk('梯度', '$\\nabla_\\theta L$', vec(gradL, { chosenIdx: CHOSEN_TOK })) +
        op('=') +
        blk('训练后 $\\theta$', '$\\theta^{\\text{new}}$', vec(thetaNewAfter, { chosenIdx: CHOSEN_TOK })) +
      '</div>' +
      '<div class="compare">' +
        '<div class="compare-card before"><div class="label">训练前 $r_t$</div><div class="value">' + f(r_t_before) + '</div></div>' +
        '<div class="compare-card after"><div class="label">训练后 $r_t$</div><div class="value" style="color:#fbbf24;">' + f(r_t_after) + '</div></div>' +
      '</div>' +
      '<div style="margin-top:14px; padding:12px 16px; background:rgba(251,191,36,0.08); border-left:3px solid #fbbf24; border-radius:6px;">' +
        '<div style="font-size:13px; color:#fbbf24; font-weight:700; margin-bottom:6px;">clip 触发！</div>' +
        '<div style="font-family:\'SF Mono\',Menlo,monospace; font-size:13px; color:#cbd5e1; line-height:1.8;">' +
          '训练后 $r_t = ' + f(r_t_after) + ' > 1 + \\epsilon = ' + f(1 + epsilon) + '$<br>' +
          '$L = \\min(r_t A, \\text{clip}(r_t) A) = \\min(' + f(r_t_after * A_PG) + ', ' + f(r_clipped_after * A_PG) + ') = ' + f(L_after) + '$<br>' +
          '如果再往这个方向更新，梯度 $= 0$（自动刹车，防止策略偏太远）' +
        '</div>' +
      '</div>',
    deriv: {
      title: 'clip 的保护机制',
      steps: [
        { label: '正常', math: 'r_t \\in [1-\\epsilon, 1+\\epsilon]', note: '$r_t$ 在范围内，$L = r_t A$，梯度正常。' },
        { label: '偏太远', math: 'r_t > 1+\\epsilon', note: '本例 $r_t = 1.48 > 1.2$。$A > 0$ 时 $L$ 被 cap 在 $(1+\\epsilon) A$。' },
        { label: '梯度消失', math: '\\nabla_\\theta L = 0', note: 'L 不再依赖 $\\theta$，梯度为 0。$\\theta$ 不再往这方向走——自动刹车。' },
        { label: '为什么需要', math: '\\text{防 reward hacking}', note: 'RM 可能被骗：某些回答 RM 给高分但实际不好。clip 说"先别太激进，最多信 1+ε"。' },
        { label: '本例', math: 'r_t = ' + f(r_t_after) + ' > 1.2', note: '这次更新让 $\\pi(\\text{2})$ 从 0.2133 升到 0.3162，偏移 $r_t = 1.48$。下次还想往这方向走会被 clip 拦住。' }
      ]
    },
    tip: 'clip 是 PPO 的精髓：允许策略变好，但不能一步跳太远。超出范围梯度消失，相当于自动刹车。这是 PPO 比 PG 训练稳定的根本原因。'
  }
];

// === 翻页逻辑 ===
let current = 0;
const TOTAL = STAGES.length;

function renderStage(idx) {
  const s = STAGES[idx];
  renderMixed(document.getElementById('sTitle'), s.title);
  renderMixed(document.getElementById('sDesc'), s.desc);
  renderDisplay(document.getElementById('sFormula'), s.formula);

  const mArea = document.getElementById('mArea');
  if (s.matrix) {
    mArea.style.display = '';
    mArea.innerHTML = s.matrix();
    scanAndRender(mArea);
  } else {
    mArea.style.display = 'none';
  }

  const derivBox = document.getElementById('derivBox');
  if (s.deriv) {
    derivBox.style.display = '';
    renderMixed(document.getElementById('dTitle'), s.deriv.title);
    const steps = s.deriv.steps.map(step => {
      const stepDiv = document.createElement('div');
      stepDiv.className = 'deriv-step';
      const labelDiv = document.createElement('div');
      labelDiv.className = 'deriv-label';
      renderMixed(labelDiv, step.label);
      const mathDiv = document.createElement('div');
      mathDiv.style.margin = '4px 0';
      renderDisplay(mathDiv, step.math);
      const noteDiv = document.createElement('div');
      noteDiv.className = 'deriv-note';
      renderMixed(noteDiv, step.note);
      stepDiv.appendChild(labelDiv);
      stepDiv.appendChild(mathDiv);
      stepDiv.appendChild(noteDiv);
      return stepDiv;
    });
    const dSteps = document.getElementById('dSteps');
    dSteps.innerHTML = '';
    steps.forEach(s => dSteps.appendChild(s));
  } else {
    derivBox.style.display = 'none';
  }

  const tipBox = document.getElementById('tipBox');
  if (s.tip) {
    tipBox.style.display = '';
    renderMixed(tipBox, s.tip);
  } else {
    tipBox.style.display = 'none';
  }

  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('tot').textContent = TOTAL;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === TOTAL - 1;
}

function change(delta) {
  const next = current + delta;
  if (next < 0 || next >= TOTAL) return;
  current = next;
  renderStage(current);
}

// 键盘翻页
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { change(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { change(1); e.preventDefault(); }
});

// === 初始化 ===
renderConventions();
renderMixed(
  document.getElementById('subtitle'),
  'RLHF 全流程：偏好数据 → RM → PG → PPO。用一个 "1+1=" 例子走完全程'
);
renderStage(0);
</script>
