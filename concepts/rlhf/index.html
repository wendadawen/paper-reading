<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>RLHF：教小孩学算术</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
  color: #e2e8f0;
  min-height: 100vh;
  padding: 16px;
  line-height: 1.6;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 20% 30%, rgba(96, 165, 250, 0.08), transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(167, 139, 250, 0.08), transparent 40%);
  pointer-events: none;
  z-index: -1;
}
.container { max-width: 900px; margin: 0 auto; padding-bottom: 80px; }
h1 {
  text-align: center;
  font-size: 26px;
  background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 20px; }

.stage {
  background: rgba(19, 26, 46, 0.7);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 24px 28px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.stage-num {
  display: inline-block;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 12px;
  color: #60a5fa;
  background: rgba(96, 165, 250, 0.12);
  padding: 2px 10px;
  border-radius: 4px;
  margin-bottom: 8px;
}
.stage-title { font-size: 20px; font-weight: 700; margin-bottom: 8px; color: #f1f5f9; }
.stage-desc { color: #cbd5e1; font-size: 15px; margin-bottom: 16px; line-height: 1.7; }
.stage-desc strong { color: #fbbf24; font-weight: 600; }

.analogy {
  background: rgba(167, 139, 250, 0.08);
  border-left: 3px solid #a78bfa;
  padding: 14px 18px;
  border-radius: 6px;
  margin: 14px 0;
}
.analogy-title {
  font-size: 13px;
  font-weight: 700;
  color: #a78bfa;
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.analogy-content { font-size: 14px; color: #cbd5e1; }

.formula-box {
  background: rgba(10, 14, 26, 0.6);
  padding: 14px 18px;
  border-radius: 6px;
  border-left: 3px solid #60a5fa;
  margin: 14px 0;
  overflow-x: auto;
}
.formula-label {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 6px;
}
.formula-explain {
  font-size: 13px;
  color: #94a3b8;
  margin-top: 8px;
  font-style: italic;
}

.scene {
  background: rgba(13, 20, 36, 0.6);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 20px;
  margin: 14px 0;
  backdrop-filter: blur(10px);
}
.scene-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  flex-wrap: wrap;
  margin: 8px 0;
}
.bubble {
  background: rgba(30, 41, 59, 0.8);
  border: 1px solid #2d3a5e;
  border-radius: 12px;
  padding: 10px 16px;
  text-align: center;
  min-width: 80px;
  font-size: 14px;
}
.bubble.prompt { border-color: #60a5fa; background: rgba(96, 165, 250, 0.12); }
.bubble.chosen { border-color: #34d399; background: rgba(52, 211, 153, 0.18); color: #34d399; }
.bubble.rejected { border-color: #f87171; background: rgba(248, 113, 113, 0.18); color: #f87171; }
.bubble.reward { border-color: #fbbf24; background: rgba(251, 191, 36, 0.15); color: #fbbf24; font-weight: 600; }
.bubble.big { font-size: 16px; font-weight: 600; padding: 14px 20px; }
.bubble-label {
  display: block;
  font-size: 11px;
  color: #94a3b8;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.arrow {
  color: #64748b;
  font-size: 18px;
  font-weight: 300;
}
.role-tag {
  display: inline-block;
  font-size: 11px;
  font-family: "SF Mono", Menlo, monospace;
  padding: 2px 8px;
  border-radius: 3px;
  margin-right: 6px;
}
.role-tag.you { background: rgba(96, 165, 250, 0.15); color: #60a5fa; }
.role-tag.kid { background: rgba(52, 211, 153, 0.15); color: #34d399; }
.role-tag.ta { background: rgba(167, 139, 250, 0.15); color: #a78bfa; }

table.analogy-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 14px;
}
table.analogy-table th, table.analogy-table td {
  padding: 10px 14px;
  border-bottom: 1px solid #2d3a5e;
  text-align: left;
}
table.analogy-table th {
  background: rgba(96, 165, 250, 0.08);
  color: #60a5fa;
  font-weight: 600;
  font-size: 13px;
}
table.analogy-table td:first-child { color: #a78bfa; font-weight: 600; }
table.analogy-table td:last-child { color: #94a3b8; }

.tip {
  background: rgba(96, 165, 250, 0.08);
  border-left: 3px solid #60a5fa;
  padding: 12px 16px;
  border-radius: 6px;
  margin-top: 14px;
  font-size: 14px;
  color: #cbd5e1;
}
.tip.warning { background: rgba(251, 191, 36, 0.08); border-left-color: #fbbf24; }
.tip.success { background: rgba(132, 204, 22, 0.08); border-left-color: #84cc16; }

.compare-table {
  width: 100%;
  border-collapse: collapse;
  margin: 14px 0;
  font-size: 14px;
}
.compare-table th, .compare-table td {
  padding: 10px 14px;
  border-bottom: 1px solid #2d3a5e;
  text-align: left;
}
.compare-table th {
  background: rgba(96, 165, 250, 0.08);
  color: #60a5fa;
}
.compare-table td:first-child { color: #fbbf24; font-weight: 600; }

.controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(13, 20, 36, 0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid #2d3a5e;
  padding: 12px 20px;
  gap: 16px;
}
.btn {
  background: rgba(96, 165, 250, 0.12);
  color: #60a5fa;
  border: 1px solid rgba(96, 165, 250, 0.35);
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  min-width: 110px;
  transition: all 0.2s;
}
.btn:hover:not(:disabled) {
  background: rgba(96, 165, 250, 0.25);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.indicator { font-size: 14px; color: #94a3b8; min-width: 100px; text-align: center; }
.indicator .current { color: #60a5fa; font-weight: 700; font-size: 16px; }

@media (max-width: 768px) {
  .container { padding: 12px; }
  .stage { padding: 18px 16px; }
  h1 { font-size: 20px; }
  table.analogy-table, .compare-table { font-size: 12px; }
  table.analogy-table th, table.analogy-table td,
  .compare-table th, .compare-table td { padding: 6px 8px; }
}
</style>
</head>
<body>
<div class="container">
  <h1>RLHF：教小孩学算术</h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="stage" id="stageBox">
    <div class="stage-num" id="sNum"></div>
    <div class="stage-title" id="sTitle"></div>
    <div class="stage-desc" id="sDesc"></div>
    <div id="sContent"></div>
  </div>
</div>

<div class="controls">
  <button class="btn" id="prevBtn" onclick="change(-1)">◀ 上一页</button>
  <div class="indicator">第 <span class="current" id="cur">1</span> / <span id="tot">6</span> 页</div>
  <button class="btn" id="nextBtn" onclick="change(1)">下一页 ▶</button>
</div>

<script>
function renderMixed(element, str) {
  element.innerHTML = '';
  const parts = str.split(/(\$\$[^$]+\$\$)/g);
  for (const part of parts) {
    if (!part) continue;
    const blockMatch = part.match(/^\$\$([^$]+)\$\$$/);
    if (blockMatch) {
      const span = document.createElement('div');
      try { katex.render(blockMatch[1], span, { displayMode: true, throwOnError: false }); }
      catch (e) { span.textContent = blockMatch[1]; }
      element.appendChild(span);
      continue;
    }
    const inlineParts = part.split(/(\$[^$]+\$)/g);
    for (const ip of inlineParts) {
      if (!ip) continue;
      const inlineMatch = ip.match(/^\$([^$]+)\$$/);
      if (inlineMatch) {
        const span = document.createElement('span');
        try { katex.render(inlineMatch[1], span, { displayMode: false, throwOnError: false }); }
        catch (e) { span.textContent = inlineMatch[1]; }
        element.appendChild(span);
      } else {
        const wrapper = document.createElement('span');
        wrapper.innerHTML = ip;
        element.appendChild(wrapper);
      }
    }
  }
}
function renderDisplay(element, latex) {
  try { katex.render(latex, element, { displayMode: true, throwOnError: false }); }
  catch (e) { element.textContent = latex; }
}
function scanAndRender(root) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let node;
  while (node = walker.nextNode()) textNodes.push(node);
  for (const textNode of textNodes) {
    const text = textNode.nodeValue;
    if (!text || !text.includes('$')) continue;
    const frag = document.createDocumentFragment();
    const regex = /(\$\$[^$]+\$\$|\$[^$\n]+\$)/g;
    let lastIdx = 0, match;
    while ((match = regex.exec(text)) !== null) {
      if (match.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
      const m = match[0];
      const span = document.createElement('span');
      try {
        if (m.startsWith('$$')) katex.render(m.slice(2, -2), span, { displayMode: true, throwOnError: false });
        else katex.render(m.slice(1, -1), span, { displayMode: false, throwOnError: false });
      } catch (e) { span.textContent = m; }
      frag.appendChild(span);
      lastIdx = match.index + m.length;
    }
    if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
    textNode.parentNode.replaceChild(frag, textNode);
  }
}

function renderStage(idx) {
  const s = STAGES[idx];
  document.getElementById('sNum').textContent = s.num;
  renderMixed(document.getElementById('sTitle'), s.title);
  renderMixed(document.getElementById('sDesc'), s.desc);
  const content = document.getElementById('sContent');
  content.innerHTML = s.html;
  scanAndRender(content);
  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('tot').textContent = STAGES.length;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === STAGES.length - 1;
}

function change(delta) {
  const next = current + delta;
  if (next < 0 || next >= STAGES.length) return;
  current = next;
  renderStage(current);
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { change(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { change(1); e.preventDefault(); }
});

// === 6 页内容 ===
const STAGES = [
  // 1. 大图
  {
    num: '大图',
    title: 'RLHF 用一个类比讲清楚',
    desc: 'RLHF 听着唬人，其实就是<strong>教小孩学算术</strong>。整个流程每一步都能对应到这个生活场景。先把这张对照表记住，后面每页都会用到。',
    html:
      '<table class="analogy-table">' +
        '<tr><th>RLHF 术语</th><th>教小孩学算术</th><th>实际是什么</th></tr>' +
        '<tr><td>policy</td><td>小孩</td><td>你正在训练的 LLM</td></tr>' +
        '<tr><td>prompt</td><td>你出的题</td><td>用户问题，如 "1+1="</td></tr>' +
        '<tr><td>action</td><td>小孩的回答</td><td>LLM 生成的 token</td></tr>' +
        '<tr><td>reward</td><td>你说"对/错"</td><td>这个回答好不好</td></tr>' +
        '<tr><td>偏好数据</td><td>你给助教看的例题</td><td>(题, 好答案, 差答案)</td></tr>' +
        '<tr><td>RM 奖励模型</td><td>助教（帮你判分）</td><td>训出来代替人工打分的模型</td></tr>' +
        '<tr><td>训 RM</td><td>教助教判分</td><td>让 RM 学会"好答案分高"</td></tr>' +
        '<tr><td>RL 训 policy</td><td>小孩答题→助教判分→小孩调整</td><td>policy 生成回答→RM 打分→policy 调整</td></tr>' +
        '<tr><td>PPO</td><td>助教判分别太绝</td><td>防止 policy 钻空子</td></tr>' +
      '</table>' +
      '<div class="analogy">' +
        '<div class="analogy-title">为什么需要这个类比</div>' +
        '<div class="analogy-content">RLHF 本质就是"让模型通过反馈学会做好事"。这跟教小孩一模一样：你出题，小孩答，你给反馈，小孩调整。区别只是 RLHF 用"助教"代替你判分，因为小孩太多（LLM 生成的回答太多）你判不过来。</div>' +
      '</div>' +
      '<div class="tip">后面 5 页会按这个顺序走：偏好数据 → 训 RM → RL 训 policy → PPO 改良 → DPO 对比。每页先讲"在干什么"，公式只作为辅助。</div>'
  },

  // 2. 偏好数据
  {
    num: '第 1 步',
    title: '偏好数据：你给助教看的例题',
    desc: '假设你是老师，要教小孩学算术。你太忙，找了个助教帮你判分。但助教一开始不知道"1+1= 的好答案是 2，差答案是 3"，你得先给他看几道例题——这就是<strong>偏好数据</strong>。',
    html:
      '<div class="scene">' +
        '<div class="scene-row">' +
          '<div class="bubble prompt"><span class="bubble-label">题目</span>1+1=</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble chosen"><span class="bubble-label">好答案</span>2</div>' +
          '<div class="arrow">+</div>' +
          '<div class="bubble rejected"><span class="bubble-label">差答案</span>3</div>' +
        '</div>' +
        '<div style="margin-top:14px; text-align:center; color:#94a3b8; font-size:13px;">' +
          '<span class="role-tag you">你</span>告诉助教：「2 比 3 好」' +
        '</div>' +
      '</div>' +
      '<div class="analogy">' +
        '<div class="analogy-title">为什么需要"好+差"配对，不给标准答案</div>' +
        '<div class="analogy-content">很多问题没有唯一标准答案。比如"怎么学 Python"，答"看官方文档"和"做项目练手"都不错。你没法说哪个是"标准答案"，但能说"A 比 B 好"。这就是偏好数据的核心优势——教相对好坏，不教绝对答案。</div>' +
      '</div>' +
      '<div class="formula-box">' +
        '<div class="formula-label">数据格式</div>' +
        '$$(x, y_w, y_l)$$' +
        '<div class="formula-explain">$x$=题目，$y_w$=好答案（chosen），$y_l$=差答案（rejected）。一条数据是一组"好+差"配对。</div>' +
      '</div>' +
      '<div class="tip">偏好数据不需要标准答案，只需要"谁比谁好"。这是 RLHF 区别于 SFT 的本质——SFT 教模仿，RLHF 教偏好。</div>'
  },

  // 3. 训 RM
  {
    num: '第 2 步',
    title: '训 RM：教助教判分',
    desc: '助教看了几道例题后，要能<strong>举一反三</strong>——给没见过的 (题目, 答案) 也能打分。这就是训 RM。RM 学的是：好答案分高，差答案分低。',
    html:
      '<div class="scene">' +
        '<div style="margin-bottom:12px; text-align:center; font-size:13px; color:#94a3b8;">训练前：助教什么都不知道，给所有答案打 0 分</div>' +
        '<div class="scene-row">' +
          '<div class="bubble prompt">1+1=</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble chosen">2</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble reward">0 分</div>' +
        '</div>' +
        '<div class="scene-row">' +
          '<div class="bubble prompt">1+1=</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble rejected">3</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble reward">0 分</div>' +
        '</div>' +
        '<div style="margin: 20px 0 12px; text-align:center; font-size:13px; color:#94a3b8;">训练后：助教学会了，好答案分高，差答案分低</div>' +
        '<div class="scene-row">' +
          '<div class="bubble prompt">1+1=</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble chosen">2</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble reward">+1 分</div>' +
        '</div>' +
        '<div class="scene-row">' +
          '<div class="bubble prompt">1+1=</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble rejected">3</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble reward">-1 分</div>' +
        '</div>' +
      '</div>' +
      '<div class="analogy">' +
        '<div class="analogy-title">RM 在学什么</div>' +
        '<div class="analogy-content">RM 学的是"相对排序"——让好答案的分高于差答案的分。绝对分不重要，差值才重要。比如 r("2")=1.0、r("3")=-1.0，和 r("2")=100、r("3")=98 效果一样，都是"2 比 3 高 2 分"。</div>' +
      '</div>' +
      '<div class="formula-box">' +
        '<div class="formula-label">RM loss（直觉版）</div>' +
        '$$\\mathcal{L}_{RM} = -\\log \\sigma(r_w - r_l)$$' +
        '<div class="formula-explain">$r_w$=好答案分，$r_l$=差答案分，$\\sigma$ 是 sigmoid 把差值压成 0~1 的概率。目标：让 $r_w - r_l$ 越大越好（loss 越小越好）。$\\sigma$ 和 $\\log$ 是数学工具，把"差值大"变成"可优化的 loss"。</div>' +
      '</div>' +
      '<div class="tip">训完 RM，助教就上线了。后面 policy 每生成一个回答，RM 都能给它打分——这就是 RL 需要的 reward 信号。</div>'
  },

  // 4. 用 RL 训 policy
  {
    num: '第 3 步',
    title: '用 RL 训 policy：小孩答题→助教判分→调整',
    desc: '助教上线，开始训小孩。流程：<strong>小孩答题 → 助教判分 → 小孩根据分数调整</strong>。这就是 RL（强化学习）——没有标准答案，靠 reward 信号让模型自己摸索。',
    html:
      '<div class="scene">' +
        '<div class="scene-row">' +
          '<div class="bubble prompt big"><span class="bubble-label">题目</span>1+1=</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble chosen big"><span class="bubble-label">小孩答</span>2</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble reward big"><span class="bubble-label">助教</span>+1 ✓</div>' +
        '</div>' +
        '<div class="scene-row">' +
          '<div class="bubble prompt big"><span class="bubble-label">题目</span>1+1=</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble rejected big"><span class="bubble-label">小孩答</span>3</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble reward big"><span class="bubble-label">助教</span>-1 ✗</div>' +
        '</div>' +
        '<div style="margin-top:14px; text-align:center; color:#94a3b8; font-size:13px;">' +
          '多轮之后：小孩学会答 2，不答 3' +
        '</div>' +
      '</div>' +
      '<div class="analogy">' +
        '<div class="analogy-title">RL 和 SFT 的本质区别</div>' +
        '<div class="analogy-content">SFT（监督学习）告诉小孩"1+1= 的答案是 2，模仿它"。RL 不告诉答案，只说"你答 2 我给 1 分，答 3 给 -1 分，自己试"。RL 没有"标准答案"，只有"reward 信号"。模型通过试错，慢慢学会生成高 reward 的回答。</div>' +
      '</div>' +
      '<div class="formula-box">' +
        '<div class="formula-label">这一步用 PG 算法（Policy Gradient）</div>' +
        '$$\\nabla_\\theta J = G \\cdot \\nabla_\\theta \\log \\pi(a|s)$$' +
        '<div class="formula-explain">$G$=return（这次的 reward），$\\pi(a|s)$=policy 在题目 $s$ 下选答案 $a$ 的概率。直觉：reward 大的答案，让它的概率上升；reward 小的，下降。<strong>这是 RL 最基础的算法</strong>，PPO 是它的改良版（下一页）。</div>' +
      '</div>' +
      '<div class="tip">RL 的核心：让高 reward 的 action 概率变大，低 reward 的变小。policy（LLM）通过不断试错，慢慢学会生成高分回答。</div>'
  },

  // 5. PPO
  {
    num: '第 3 步改良',
    title: 'PPO：助教判分别太绝',
    desc: 'PG 有个问题：小孩答完一次就丢，下次又要重新答——太浪费。而且如果某次助教被小孩"骗了"（小孩乱答但助教给高分），小孩会一直乱答。<strong>PPO 是 PG 的改良版</strong>，解决这两个问题。',
    html:
      '<div class="scene">' +
        '<div style="margin-bottom:10px; text-align:center; font-size:13px; color:#94a3b8;">PG：采一次用一次，浪费</div>' +
        '<div class="scene-row">' +
          '<div class="bubble prompt">1+1=</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble chosen">答 2</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble reward">+1</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble">用完丢掉</div>' +
        '</div>' +
        '<div style="margin: 16px 0 10px; text-align:center; font-size:13px; color:#94a3b8;">PPO：采一次用多次，且限制小孩别偏太远</div>' +
        '<div class="scene-row">' +
          '<div class="bubble prompt">1+1=</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble chosen">答 2</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble reward">+1</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble">复用多次</div>' +
        '</div>' +
      '</div>' +
      '<div class="analogy">' +
        '<div class="analogy-title">PPO 的两个关键：复用 + clip</div>' +
        '<div class="analogy-content">' +
          '<strong>复用旧样本</strong>：PG 采一次用一次就丢，PPO 用 importance ratio（重要性比率）让旧样本也能参与训练。省数据。<br><br>' +
          '<strong>clip（截断）</strong>：防止小孩钻空子。如果某次小孩发现"答 2.5"也能骗助教给高分（reward hacking），PPO 说"先别太激进，最多允许你偏离 20%"。超出范围梯度消失，相当于自动刹车。' +
        '</div>' +
      '</div>' +
      '<div class="formula-box">' +
        '<div class="formula-label">PPO 目标</div>' +
        '$$L^{\\text{CLIP}} = \\min\\left(r_t A, \\, \\text{clip}(r_t, 1-\\epsilon, 1+\\epsilon) A\\right)$$' +
        '<div class="formula-explain">$r_t$=新旧 policy 的比率（新 policy 偏好这个答案几倍），$A$=advantage（这个答案相对平均好不好），$\\epsilon$=clip 范围（通常 0.2）。超出 $[1-\\epsilon, 1+\\epsilon]$ 梯度消失——不让 policy 偏太远。</div>' +
      '</div>' +
      '<div class="tip">PPO = PG + 复用旧样本 + clip 防偏移。是 RLHF 的事实标准（ChatGPT 用的）。</div>'
  },

  // 6. DPO 对比
  {
    num: '另一条路',
    title: 'DPO：不要助教，直接教小孩',
    desc: 'RLHF 要训助教（RM）+ 用 RL 训小孩（policy），3 步走。有人发现：<strong>数学上可以跳过助教，直接在偏好数据上训小孩</strong>。这就是 DPO（Direct Preference Optimization，直接偏好优化）。',
    html:
      '<div class="scene">' +
        '<div style="margin-bottom:10px; text-align:center; font-size:13px; color:#94a3b8;">RLHF 路线（3 步）</div>' +
        '<div class="scene-row">' +
          '<div class="bubble">偏好数据</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble" style="border-color:#a78bfa; background:rgba(167,139,250,0.15); color:#a78bfa;">训 RM（助教）</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble" style="border-color:#34d399; background:rgba(52,211,153,0.15); color:#34d399;">用 PPO 训 policy</div>' +
        '</div>' +
        '<div style="margin: 20px 0 10px; text-align:center; font-size:13px; color:#94a3b8;">DPO 路线（1 步）</div>' +
        '<div class="scene-row">' +
          '<div class="bubble">偏好数据</div>' +
          '<div class="arrow">→</div>' +
          '<div class="bubble big" style="border-color:#34d399; background:rgba(52,211,153,0.15); color:#34d399;">直接训 policy</div>' +
        '</div>' +
      '</div>' +
      '<table class="compare-table">' +
        '<tr><th>维度</th><th>RLHF</th><th>DPO</th></tr>' +
        '<tr><td>步数</td><td>3 步</td><td>1 步</td></tr>' +
        '<tr><td>需要训 RM</td><td>是</td><td>否</td></tr>' +
        '<tr><td>需要 RL</td><td>是（PPO）</td><td>否</td></tr>' +
        '<tr><td>能持续探索</td><td>是</td><td>否（只用静态数据）</td></tr>' +
        '<tr><td>训练稳定性</td><td>较差</td><td>好</td></tr>' +
        '<tr><td>代表模型</td><td>ChatGPT、Claude</td><td>Llama 3、Qwen</td></tr>' +
      '</table>' +
      '<div class="analogy">' +
        '<div class="analogy-title">DPO 的核心洞察</div>' +
        '<div class="analogy-content">数学上可以证明：最优的 policy 可以直接从偏好数据 + 参考模型算出来，<strong>不需要显式训 RM，也不需要 PPO</strong>。DPO 把 RLHF 的 3 步压缩成 1 步——一个 loss 搞定。代价是没法像 RLHF 那样持续探索新回答。</div>' +
      '</div>' +
      '<div class="tip">工业界现在流行：DPO 做 base，RLHF 做精细调整。两者不是对立的，可以组合用。</div>'
  }
];

let current = 0;
renderMixed(document.getElementById('subtitle'), '用一个生活类比讲清楚 RLHF 到底在干什么');
renderStage(0);
