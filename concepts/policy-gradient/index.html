<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Policy Gradient：策略梯度</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "Helvetica Neue", "PingFang SC", sans-serif;
  background: linear-gradient(135deg, #0a0e1a 0%, #1a1f35 100%);
  color: #e2e8f0;
  min-height: 100vh;
  padding: 16px;
  line-height: 1.6;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(circle at 20% 30%, rgba(96, 165, 250, 0.08), transparent 40%),
              radial-gradient(circle at 80% 70%, rgba(167, 139, 250, 0.08), transparent 40%);
  pointer-events: none;
  z-index: -1;
}
.container { max-width: 1100px; margin: 0 auto; padding-bottom: 80px; }
h1 {
  text-align: center;
  font-size: 26px;
  background: linear-gradient(90deg, #60a5fa, #a78bfa, #f472b6);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.subtitle { text-align: center; color: #94a3b8; font-size: 13px; margin-bottom: 16px; }

.stage {
  background: rgba(19, 26, 46, 0.7);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.stage-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: #f1f5f9; }
.stage-desc { color: #cbd5e1; font-size: 14px; margin-bottom: 10px; }
.stage-formula {
  background: rgba(10, 14, 26, 0.6);
  padding: 12px 16px;
  border-radius: 6px;
  border-left: 3px solid #60a5fa;
  margin: 10px 0;
  overflow-x: auto;
}

.matrix-area {
  background: rgba(13, 20, 36, 0.6);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 24px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.matrix-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  flex-wrap: wrap;
}
.matrix-block { display: flex; flex-direction: column; align-items: center; gap: 4px; }
.matrix-label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
.matrix-name { font-size: 15px; font-weight: 700; color: #e2e8f0; margin-bottom: 2px; }
.matrix {
  display: grid;
  gap: 2px;
  background: rgba(5, 8, 16, 0.6);
  padding: 4px;
  border-radius: 4px;
  border: 1px solid #2d3a5e;
}
.cell {
  padding: 6px 10px;
  background: rgba(30, 41, 59, 0.6);
  border-radius: 3px;
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
  text-align: center;
  min-width: 50px;
  color: #e2e8f0;
  transition: all 0.4s ease;
}
.cell.chosen { border: 1.5px solid #34d399; background: rgba(52, 211, 153, 0.18); }
.cell.rejected { border: 1.5px solid #f87171; background: rgba(248, 113, 113, 0.18); }
.cell.highlight {
  background: rgba(96, 165, 250, 0.3) !important;
  box-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
  transform: scale(1.05);
}
.cell.big { font-size: 16px; font-weight: 700; }
.op { font-size: 18px; color: #64748b; font-weight: 300; }

.derivation {
  background: rgba(19, 26, 46, 0.7);
  border: 1px solid #2d3a5e;
  border-radius: 10px;
  padding: 16px 22px;
  margin-bottom: 14px;
  backdrop-filter: blur(10px);
}
.deriv-title { font-size: 14px; font-weight: 700; color: #fbbf24; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
.deriv-step {
  margin: 12px 0;
  padding: 10px 14px;
  background: rgba(13, 20, 36, 0.6);
  border-radius: 6px;
  border-left: 2px solid #fbbf24;
}
.deriv-label { font-size: 12px; color: #94a3b8; margin-bottom: 4px; }
.deriv-note { font-size: 13px; color: #94a3b8; margin-top: 6px; font-style: italic; }

.calc {
  font-family: "SF Mono", Menlo, monospace;
  font-size: 13px;
  color: #cbd5e1;
  margin: 4px 0;
  padding-left: 16px;
}
.calc .num { color: #fbbf24; font-weight: 600; }
.calc .result { color: #34d399; font-weight: 600; }
.calc .mark { color: #64748b; }

.compare { display: flex; gap: 16px; justify-content: center; margin-top: 12px; flex-wrap: wrap; }
.compare-card {
  background: rgba(13, 20, 36, 0.6);
  padding: 10px 18px;
  border-radius: 6px;
  border: 1px solid #2d3a5e;
  text-align: center;
  min-width: 110px;
}
.compare-card .label { font-size: 11px; color: #94a3b8; margin-bottom: 2px; }
.compare-card .value { font-family: "SF Mono", Menlo, monospace; font-size: 20px; font-weight: 700; }
.compare-card.chosen .value { color: #34d399; }
.compare-card.rejected .value { color: #f87171; }
.compare-card.before .value { color: #f87171; }
.compare-card.after .value { color: #84cc16; }

.tip {
  background: rgba(96, 165, 250, 0.08);
  border-left: 3px solid #60a5fa;
  padding: 10px 14px;
  border-radius: 6px;
  margin-top: 10px;
  font-size: 13px;
  color: #cbd5e1;
}
.tip.warning { background: rgba(251, 191, 36, 0.08); border-left-color: #fbbf24; }
.tip.success { background: rgba(132, 204, 22, 0.08); border-left-color: #84cc16; }

.convention {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 8px;
  margin-top: 10px;
}
.conv-item {
  background: rgba(13, 20, 36, 0.5);
  padding: 8px 14px;
  border-radius: 6px;
  border-left: 2px solid #60a5fa;
  font-size: 14px;
  color: #cbd5e1;
}
.conv-item .conv-sym {
  font-family: "SF Mono", Menlo, monospace;
  font-weight: 600;
  color: #60a5fa;
  margin-right: 8px;
}

.controls {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(13, 20, 36, 0.95);
  backdrop-filter: blur(10px);
  border-top: 1px solid #2d3a5e;
  padding: 12px 20px;
  gap: 16px;
}
.btn {
  background: rgba(96, 165, 250, 0.12);
  color: #60a5fa;
  border: 1px solid rgba(96, 165, 250, 0.35);
  padding: 8px 18px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  font-weight: 600;
  min-width: 110px;
  transition: all 0.2s;
}
.btn:hover:not(:disabled) {
  background: rgba(96, 165, 250, 0.25);
  transform: translateY(-1px);
}
.btn:disabled { opacity: 0.3; cursor: not-allowed; }
.indicator { font-size: 14px; color: #94a3b8; min-width: 100px; text-align: center; }
.indicator .current { color: #60a5fa; font-weight: 700; font-size: 16px; }

@media (max-width: 768px) {
  .matrix-row { gap: 8px; }
  .cell { min-width: 40px; padding: 4px 6px; font-size: 11px; }
  .op { font-size: 14px; }
  h1 { font-size: 18px; }
  .convention { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="container">
  <h1>Policy Gradient：策略梯度</h1>
  <p class="subtitle" id="subtitle"></p>

  <div class="stage">
    <div class="stage-title">数学约定</div>
    <div class="stage-desc">Policy Gradient 用到的记号。</div>
    <div class="convention" id="conv-grid"></div>
  </div>

  <div class="stage" id="stageBox">
    <div class="stage-title" id="sTitle"></div>
    <div class="stage-desc" id="sDesc"></div>
    <div class="stage-formula" id="sFormula"></div>
  </div>

  <div class="matrix-area" id="mArea"></div>

  <div class="derivation" id="derivBox" style="display:none;">
    <div class="deriv-title" id="dTitle"></div>
    <div id="dSteps"></div>
  </div>

  <div class="tip" id="tipBox" style="display:none;"></div>
</div>

<div class="controls">
  <button class="btn" id="prevBtn" onclick="change(-1)">◀ 上一页</button>
  <div class="indicator">第 <span class="current" id="cur">1</span> / <span id="tot">8</span> 页</div>
  <button class="btn" id="nextBtn" onclick="change(1)">下一页 ▶</button>
</div>

<script>
// === 数学渲染辅助（和 backward/dpo/rm 保持一致） ===
function renderMixed(element, str) {
  element.innerHTML = '';
  const parts = str.split(/(\$\$[^$]+\$\$)/g);
  for (const part of parts) {
    if (!part) continue;
    const blockMatch = part.match(/^\$\$([^$]+)\$\$$/);
    if (blockMatch) {
      const span = document.createElement('div');
      try { katex.render(blockMatch[1], span, { displayMode: true, throwOnError: false }); }
      catch (e) { span.textContent = blockMatch[1]; }
      element.appendChild(span);
      continue;
    }
    const inlineParts = part.split(/(\$[^$]+\$)/g);
    for (const ip of inlineParts) {
      if (!ip) continue;
      const inlineMatch = ip.match(/^\$([^$]+)\$$/);
      if (inlineMatch) {
        const span = document.createElement('span');
        try { katex.render(inlineMatch[1], span, { displayMode: false, throwOnError: false }); }
        catch (e) { span.textContent = inlineMatch[1]; }
        element.appendChild(span);
      } else {
        const wrapper = document.createElement('span');
        wrapper.innerHTML = ip;
        element.appendChild(wrapper);
      }
    }
  }
}
function renderDisplay(element, latex) {
  try { katex.render(latex, element, { displayMode: true, throwOnError: false }); }
  catch (e) { element.textContent = latex; }
}
function scanAndRender(root) {
  const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
  const textNodes = [];
  let node;
  while (node = walker.nextNode()) textNodes.push(node);
  for (const textNode of textNodes) {
    const text = textNode.nodeValue;
    if (!text || !text.includes('$')) continue;
    const frag = document.createDocumentFragment();
    const regex = /(\$\$[^$]+\$\$|\$[^$\n]+\$)/g;
    let lastIdx = 0, match;
    while ((match = regex.exec(text)) !== null) {
      if (match.index > lastIdx) frag.appendChild(document.createTextNode(text.slice(lastIdx, match.index)));
      const m = match[0];
      const span = document.createElement('span');
      try {
        if (m.startsWith('$$')) katex.render(m.slice(2, -2), span, { displayMode: true, throwOnError: false });
        else katex.render(m.slice(1, -1), span, { displayMode: false, throwOnError: false });
      } catch (e) { span.textContent = m; }
      frag.appendChild(span);
      lastIdx = match.index + m.length;
    }
    if (lastIdx < text.length) frag.appendChild(document.createTextNode(text.slice(lastIdx)));
    textNode.parentNode.replaceChild(frag, textNode);
  }
}

// === 工具函数 ===
function f(v, n = 4) { return Number(v).toFixed(n); }
function vec(v, opts = {}) {
  const { hl, tgt, chosenIdx, rejectedIdx, cls = [] } = opts;
  const cells = v.map((val, i) => {
    let c = 'cell';
    if (chosenIdx !== undefined && i === chosenIdx) c += ' chosen';
    if (rejectedIdx !== undefined && i === rejectedIdx) c += ' rejected';
    if (hl === i) c += ' highlight';
    if (tgt === i) c += ' target';
    cls.forEach(k => { if (k(i)) c += ' ' + k; });
    return '<div class="' + c + '">' + (typeof val === 'number' ? f(val) : val) + '</div>';
  }).join('');
  return '<div class="matrix" style="grid-template-columns: 1fr;">' + cells + '</div>';
}
function blk(label, name, html) {
  return '<div class="matrix-block">' +
    (label ? '<div class="matrix-label">' + label + '</div>' : '') +
    (name ? '<div class="matrix-name">' + name + '</div>' : '') +
    html +
  '</div>';
}
function op(s) {
  return '<div class="op">' + s + '</div>';
}
function calc(latex, value, mark) {
  let s = '<div class="calc">' + latex;
  if (value !== undefined && value !== null) s += ' = <span class="result">' + value + '</span>';
  if (mark) s += ' <span class="mark">' + mark + '</span>';
  s += '</div>';
  return s;
}

// === 数学约定卡片 ===
const CONVENTIONS = [
  { sym: 's', desc: 'state（状态）。本例中是固定的 prompt $x$' },
  { sym: 'a', desc: 'action（动作）。在 LLM 场景下就是生成的 token' },
  { sym: 'r', desc: 'reward（奖励）。动作执行后环境给的标量反馈' },
  { sym: 'G_t', desc: 'return（回报）。从时刻 $t$ 开始的累计奖励。本例单步简化 $G = r$' },
  { sym: '\\pi_\\theta', desc: '策略（参数 $\\theta$ 可更新）。$\\pi_\\theta(a|s)$ 表示在 $s$ 下选 $a$ 的概率' },
  { sym: '\\theta', desc: '策略参数。本例中是 logits 向量' },
  { sym: 'J(\\theta)', desc: '目标函数 = 期望回报 $J = \\mathbb{E}[G]$。最大化 $J$ = 让期望回报变大' },
  { sym: '\\nabla_\\theta', desc: '梯度算子。$\\nabla_\\theta J$ 指向 $J$ 上升最快的方向' },
  { sym: '\\mathbb{E}', desc: '期望符号。$\\mathbb{E}[X]$ 表示随机变量 $X$ 的期望（均值）' },
  { sym: '\\log', desc: '自然对数。$\\log \\pi(a|s)$ 是 $\\pi(a|s)$ 的对数' },
  { sym: '\\sigma', desc: 'sigmoid 函数 $\\sigma(t) = 1/(1+e^{-t})$' },
  { sym: '\\text{softmax}', desc: '$\\text{softmax}(z)_i = e^{z_i} / \\sum_j e^{z_j}$，把 logits 压成概率' },
  { sym: '\\text{one\\_hot}(a)', desc: 'one-hot 向量。第 $a$ 位是 1，其他是 0' },
  { sym: '\\partial', desc: '偏导符号。$\\frac{\\partial L}{\\partial \\theta}$ 读作「$L$ 对 $\\theta$ 的偏导」' },
  { sym: '\\sum', desc: '求和符号。$\\sum_j e^{z_j}$ 表示对所有 $j$ 求和' },
  { sym: 'e', desc: '自然对数底 $\\approx 2.718$。softmax 里用 $e^{z_i}$' },
  { sym: '\\eta', desc: '学习率，控制每步走多远' },
  { sym: '\\to', desc: '趋向 / 映射到。$a \\to b$ 表示 $a$ 变成 $b$' }
];

function renderConventions() {
  const grid = document.getElementById('conv-grid');
  grid.innerHTML = '';
  CONVENTIONS.forEach(c => {
    const item = document.createElement('div');
    item.className = 'conv-item';
    const sym = document.createElement('span');
    sym.className = 'conv-sym';
    item.appendChild(sym);
    const desc = document.createElement('span');
    desc.className = 'conv-desc';
    item.appendChild(desc);
    grid.appendChild(item);
    renderDisplay(sym, c.sym);
    renderMixed(desc, c.desc);
  });
}

// === 场景：一个最小例子 ===
// 4 个 token: hello(0) hi(1) there(2) bye(3)
// state s = "hello"（固定 prompt）
// action a = 生成的下一个 token
// reward: hi(1) → r=1.0, 其他 → r=0.0
// 策略 π_θ(a|s) = softmax(θ)_a, θ 是 logits（参数）

const VOCAB_NAMES = ['hello', 'hi', 'there', 'bye'];
const ACTION_TOK = 1;  // "hi"
const REWARD = 1.0;

// 初始 logits（参数）
const thetaBefore = [0.5, 0.8, 0.3, 0.1];
// 一步更新后（lr=0.5）
const lr = 0.5;
const thetaAfter = [0.3698, 1.1242, 0.1934, 0.0127];

function softmax(z) {
  const e = z.map(v => Math.exp(v));
  const sum = e.reduce((a, b) => a + b, 0);
  return e.map(v => v / sum);
}

const piBefore = softmax(thetaBefore);
const piAfter = softmax(thetaAfter);
const logPiBefore = Math.log(piBefore[ACTION_TOK]);
const logPiAfter = Math.log(piAfter[ACTION_TOK]);
const G = REWARD;
const JBefore = G * logPiBefore;
const JAfter = G * logPiAfter;

// 梯度 ∇_θ log π(a|s)_i = one_hot_i - π_i
const gradLogPiFixed = thetaBefore.map((_, i) =>
  (i === ACTION_TOK ? 1.0 : 0.0) - piBefore[i]
);
// ∇_θ J = G · ∇_θ log π
const gradJ = gradLogPiFixed.map(g => G * g);

// === 页面数据 ===
const STAGES = [
  // 1. 起点
  {
    title: '起点：策略和奖励',
    desc: 'Policy Gradient 是 RL 的基础算法。设定：状态 $s$（固定 prompt），动作 $a$（生成的 token），策略 $\\pi_\\theta(a|s)$ 给出在 $s$ 下选 $a$ 的概率。环境给每个 action 一个 reward。',
    formula: '\\pi_\\theta(a|s) = \\text{softmax}(\\theta)_a',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('state<br>（固定）', '$s$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell highlight">hello</div></div>') +
        op('→') +
        blk('策略<br>（参数 $\\theta$）', '$\\pi_\\theta$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big">softmax</div></div>') +
        op('→') +
        blk('action 概率', '$\\pi(a|s)$', vec(piBefore, { chosenIdx: ACTION_TOK })) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\theta = [' + thetaBefore.map(v => f(v)).join(', ') + ']$（初始 logits）') +
        calc('$\\pi = [' + piBefore.map(v => f(v)).join(', ') + ']$') +
      '</div>' +
      '<div style="margin-top:10px;">' +
        calc('reward 函数：$r(\\text{hi}) = 1.0$，其他 $= 0.0$') +
      '</div>',
    deriv: {
      title: 'PG 和监督学习的区别',
      steps: [
        { label: 'SFT', math: '\\text{给标准答案 } y \\text{，最大化 } \\log p(y|x)', note: '有 label，直接监督。' },
        { label: 'PG', math: '\\text{没有标准答案，靠 reward 信号引导}', note: '模型采样 action，环境给 reward，让 reward 大的 action 概率上升。' },
        { label: '关键', math: 'J(\\theta) = \\mathbb{E}_{a \\sim \\pi_\\theta}[r(a)]', note: '最大化期望 reward。注意是期望——所以要采样。' }
      ]
    },
    tip: 'PG 的核心：没有标准答案，只有 reward 信号。让高 reward 的 action 出现概率变大。'
  },

  // 2. 采样
  {
    title: '采样：从策略抽一个 action',
    desc: '按当前策略 $\\pi_\\theta$ 的概率分布采样一个 action。本例假设采样到 $a = \\text{hi}$（token 1），环境给 reward $r = 1.0$。',
    formula: 'a \\sim \\pi_\\theta(\\cdot | s), \\quad r = r(a)',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('策略', '$\\pi$', vec(piBefore, { chosenIdx: ACTION_TOK })) +
        op('→ 采样 →') +
        blk('action', '$a$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell chosen big">' + VOCAB_NAMES[ACTION_TOK] + '</div></div>') +
        op('→ 环境给 →') +
        blk('reward', '$r$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big" style="color:#fbbf24;">' + f(REWARD) + '</div></div>') +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\pi(\\text{hi}|s) = ' + f(piBefore[ACTION_TOK]) + '$（选中的概率）') +
        calc('采样到 $a = \\text{hi}$，环境返回 $r = ' + f(REWARD) + '$') +
      '</div>',
    deriv: null,
    tip: 'PG 是 on-policy 算法——只能用当前策略采的样本更新当前策略。采到的样本用一次就丢。'
  },

  // 3. 回报 G_t
  {
    title: '回报 $G_t$：单步简化',
    desc: '正式 PG 里 $G_t = \\sum_{k=0}^{\\infty} \\gamma^k r_{t+k+1}$ 是未来奖励的累计折现。本例单步场景，$G_t = r$（直接等于这一步的 reward）。后续用 $G$ 简写。',
    formula: 'G = r \\quad (\\text{单步场景})',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('reward', '$r$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big" style="color:#fbbf24;">' + f(REWARD) + '</div></div>') +
        op('=') +
        blk('回报', '$G$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big highlight">' + f(G) + '</div></div>') +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$G = r = ' + f(G) + '$') +
      '</div>',
    deriv: {
      title: '为什么单步简化',
      steps: [
        { label: '正式定义', math: 'G_t = r_{t+1} + \\gamma r_{t+2} + \\gamma^2 r_{t+3} + \\cdots', note: '未来奖励的折现和。$\\gamma \\in [0,1]$ 是折扣因子。' },
        { label: '单步场景', math: 'G = r', note: '只看当前 reward，不考虑未来。教学简化，但梯度结构和正式 PG 一致。' },
        { label: '为什么需要 G', math: '\\nabla_\\theta J = \\mathbb{E}[G \\cdot \\nabla_\\theta \\log \\pi(a|s)]', note: 'PG 定理里 $G$ 是梯度更新的「权重」——reward 大的 action，更新幅度大。' }
      ]
    },
    tip: '$G$ 是「这次采样的好坏」。$G$ 大 → 这次 action 好 → 让它的概率变大。'
  },

  // 4. log 概率
  {
    title: 'log 概率：$\\log \\pi(a|s)$',
    desc: '算选中 action 的对数概率。这是 PG 公式里的核心量。',
    formula: '\\log \\pi(a|s) = \\log \\text{softmax}(\\theta)_a',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('选中概率', '$\\pi(a|s)$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell chosen big">' + f(piBefore[ACTION_TOK]) + '</div></div>') +
        op('→ log →') +
        blk('对数概率', '$\\log \\pi$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big" style="color:#fbbf24;">' + f(logPiBefore) + '</div></div>') +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\pi(a|s) = ' + f(piBefore[ACTION_TOK]) + '$') +
        calc('$\\log \\pi(a|s) = \\log p = ' + f(logPiBefore) + '$', '', '负数（概率 < 1）') +
      '</div>',
    deriv: null,
    tip: '为什么要 log？因为 $\\nabla_\\theta \\log \\pi$ 比 $\\nabla_\\theta \\pi$ 形式简单——这就是 PG 定理的妙处。'
  },

  // 5. 策略梯度定理
  {
    title: '策略梯度定理',
    desc: 'PG 定理给出 $\\nabla_\\theta J$ 的形式：期望下，是 $G \\cdot \\nabla_\\theta \\log \\pi(a|s)$。这是 RL 的核心公式，所有 PG 方法（REINFORCE/PPO/Actor-Critic）都从它推出来。',
    formula: '\\nabla_\\theta J(\\theta) = \\mathbb{E}_{a \\sim \\pi_\\theta} \\left[ G \\cdot \\nabla_\\theta \\log \\pi_\\theta(a|s) \\right]',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('回报', '$G$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big" style="color:#fbbf24;">' + f(G) + '</div></div>') +
        op('×') +
        blk('log 概率梯度', '$\\nabla_\\theta \\log \\pi$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big">...</div></div>') +
        op('=') +
        blk('目标梯度', '$\\nabla_\\theta J$', '<div class="matrix" style="grid-template-columns: 1fr;"><div class="cell big highlight">见下</div></div>') +
      '</div>',
    deriv: {
      title: 'PG 定理推导（简化）',
      steps: [
        { label: '目标', math: 'J(\\theta) = \\mathbb{E}_{a \\sim \\pi_\\theta}[r(a)]', note: '最大化期望 reward。' },
        { label: '展开期望', math: 'J = \\sum_a \\pi_\\theta(a|s) \\cdot r(a)', note: '期望 = 概率 × 值之和。' },
        { label: '对 $\\theta$ 求导', math: '\\nabla_\\theta J = \\sum_a \\nabla_\\theta \\pi_\\theta(a|s) \\cdot r(a)', note: '$r(a)$ 不依赖 $\\theta$。' },
        { label: 'log 技巧', math: '\\nabla_\\theta \\pi = \\pi \\cdot \\nabla_\\theta \\log \\pi', note: '因为 $\\nabla \\log f = \\nabla f / f$，所以 $\\nabla f = f \\cdot \\nabla \\log f$。' },
        { label: '代回去', math: '\\nabla_\\theta J = \\sum_a \\pi_\\theta(a|s) \\cdot \\nabla_\\theta \\log \\pi_\\theta(a|s) \\cdot r(a)', note: '把 $\\pi$ 凑成期望的形式。' },
        { label: '写回期望', math: '\\nabla_\\theta J = \\mathbb{E}_{a \\sim \\pi_\\theta}[r(a) \\cdot \\nabla_\\theta \\log \\pi_\\theta(a|s)]', note: '用 $G$ 替换 $r$ 推广到多步。' },
        { label: '样本估计', math: '\\nabla_\\theta J \\approx G \\cdot \\nabla_\\theta \\log \\pi(a|s)', note: '一次采样估计期望。这就是 REINFORCE。' }
      ]
    },
    tip: '关键直觉：$G$ 大 → 这次 action 好 → 让它的 $\\log \\pi$ 上升。$G$ 小或负 → 这次 action 差 → 让 $\\log \\pi$ 下降。'
  },

  // 6. softmax 的 log 梯度
  {
    title: 'softmax 的 $\\nabla_\\theta \\log \\pi$',
    desc: '对 softmax 策略 $\\pi = \\text{softmax}(\\theta)$，$\\log \\pi(a|s)$ 对 $\\theta_i$ 的偏导有一个优美的公式：$\\text{one\\_hot}(a)_i - \\pi_i$。',
    formula: '\\frac{\\partial \\log \\pi(a|s)}{\\partial \\theta_i} = \\text{one\\_hot}(a)_i - \\pi_i',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('one-hot(a)', '$\\mathbf{e}_a$', vec(thetaBefore.map((_, i) => i === ACTION_TOK ? 1.0 : 0.0), { chosenIdx: ACTION_TOK })) +
        op('−') +
        blk('策略', '$\\pi$', vec(piBefore, { chosenIdx: ACTION_TOK })) +
        op('=') +
        blk('梯度', '$\\nabla_\\theta \\log \\pi$', vec(gradLogPiFixed, { chosenIdx: ACTION_TOK })) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\text{one\\_hot}(a) = [' + thetaBefore.map((_, i) => i === ACTION_TOK ? '1' : '0').join(', ') + ']$') +
        calc('$\\pi = [' + piBefore.map(v => f(v)).join(', ') + ']$') +
        calc('$\\nabla_\\theta \\log \\pi = [' + gradLogPiFixed.map(v => f(v)).join(', ') + ']$', '', 'result') +
      '</div>' +
      '<div style="margin-top:10px;">' +
        calc('$\\partial / \\partial \\theta_{\\text{hi}} = 1 - ' + f(piBefore[ACTION_TOK]) + ' = ' + f(gradLogPiFixed[ACTION_TOK]) + '$', '', '选中 action → 正梯度') +
        calc('$\\partial / \\partial \\theta_{\\text{hello}} = 0 - ' + f(piBefore[0]) + ' = ' + f(gradLogPiFixed[0]) + '$', '', '非选中 → 负梯度') +
      '</div>',
    deriv: {
      title: 'softmax log 梯度推导',
      steps: [
        { label: 'softmax', math: '\\pi_i = \\frac{e^{\\theta_i}}{\\sum_j e^{\\theta_j}}', note: '标准 softmax 定义。' },
        { label: 'log', math: '\\log \\pi_a = \\theta_a - \\log \\sum_j e^{\\theta_j}', note: '取 log，分子分母分开。' },
        { label: '对 $\\theta_i$ 求导（$i = a$）', math: '\\frac{\\partial \\log \\pi_a}{\\partial \\theta_a} = 1 - \\frac{e^{\\theta_a}}{\\sum_j e^{\\theta_j}} = 1 - \\pi_a', note: '前一项导数为 1，后一项是 softmax 自己。' },
        { label: '对 $\\theta_i$ 求导（$i \\neq a$）', math: '\\frac{\\partial \\log \\pi_a}{\\partial \\theta_i} = 0 - \\pi_i = -\\pi_i', note: '前一项 $\\theta_a$ 和 $\\theta_i$ 无关，导数为 0。' },
        { label: '合并', math: '\\frac{\\partial \\log \\pi_a}{\\partial \\theta_i} = \\text{one\\_hot}(a)_i - \\pi_i', note: '选中位 $1 - \\pi$，其他 $-\\pi$。' }
      ]
    },
    tip: '选中 action 的位梯度是 $1 - \\pi$（正的，让 $\\theta$ 升）；其他位是 $-\\pi$（负的，让 $\\theta$ 降）。'
  },

  // 7. 一步更新
  {
    title: '一步更新：$\\theta^{\\text{new}} = \\theta^{\\text{old}} + \\eta \\, \\nabla_\\theta J$',
    desc: 'PG 是最大化 $J$，所以走梯度上升方向（注意是 $+$，不是 $-$）。这是 RL 和监督学习（最小化 loss）的关键区别。',
    formula: '\\theta^{\\text{new}} = \\theta^{\\text{old}} + \\eta \\, \\nabla_\\theta J',
    matrix: () =>
      '<div style="background:rgba(19,26,46,0.7); border:1px solid #2d3a5e; border-radius:10px; padding:16px 22px; margin-bottom:14px; backdrop-filter:blur(10px);">' +
        '<div style="font-family:\'SF Mono\',Menlo,monospace; font-size:13px; color:#cbd5e1; line-height:1.8;">' +
          '① $\\theta^{\\text{old}}$ → $\\pi$ → 采样 $a$ → 环境 $r$<br>' +
          '② 算 $G = r$，$\\log \\pi(a|s)$<br>' +
          '③ $\\nabla_\\theta J = G \\cdot (\\text{one\\_hot}(a) - \\pi)$<br>' +
          '④ $\\theta^{\\text{new}} = \\theta^{\\text{old}} + \\eta \\, \\nabla_\\theta J$' +
        '</div>' +
      '</div>' +
      '<div class="matrix-row">' +
        blk('训练前 $\\theta$', '$\\theta^{\\text{old}}$', vec(thetaBefore)) +
        op('+ η·∇J') +
        blk('梯度', '$\\nabla_\\theta J$', vec(gradJ, { chosenIdx: ACTION_TOK })) +
        op('=') +
        blk('训练后 $\\theta$', '$\\theta^{\\text{new}}$', vec(thetaAfter, { chosenIdx: ACTION_TOK })) +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\nabla_\\theta J = G \\cdot (\\text{one\\_hot}(a) - \\pi) = ' + f(G) + ' \\cdot [' + gradLogPiFixed.map(v => f(v)).join(', ') + ']$') +
        calc('$= [' + gradJ.map(v => f(v)).join(', ') + ']$') +
      '</div>' +
      '<div style="margin-top:10px;">' +
        calc('$\\theta_{\\text{hello}} = ' + f(thetaBefore[0]) + ' + ' + f(lr) + ' \\times ' + f(gradJ[0]) + ' = ' + f(thetaAfter[0]) + '$', '', '降') +
        calc('$\\theta_{\\text{hi}} = ' + f(thetaBefore[1]) + ' + ' + f(lr) + ' \\times ' + f(gradJ[1]) + ' = ' + f(thetaAfter[1]) + '$', '', '升 ← 选中') +
        calc('$\\theta_{\\text{there}} = ' + f(thetaBefore[2]) + ' + ' + f(lr) + ' \\times ' + f(gradJ[2]) + ' = ' + f(thetaAfter[2]) + '$', '', '降') +
        calc('$\\theta_{\\text{bye}} = ' + f(thetaBefore[3]) + ' + ' + f(lr) + ' \\times ' + f(gradJ[3]) + ' = ' + f(thetaAfter[3]) + '$', '', '降') +
      '</div>',
    deriv: {
      title: '梯度上升 vs 梯度下降',
      steps: [
        { label: '监督学习', math: '\\text{最小化 loss: } \\theta^{\\text{new}} = \\theta^{\\text{old}} - \\eta \\nabla_\\theta L', note: '走负梯度方向让 $L$ 下降。' },
        { label: 'RL', math: '\\text{最大化 return: } \\theta^{\\text{new}} = \\theta^{\\text{old}} + \\eta \\nabla_\\theta J', note: '走正梯度方向让 $J$ 上升。符号反了！' },
        { label: '统一视角', math: '\\text{最小化 } -J: \\theta^{\\text{new}} = \\theta^{\\text{old}} - \\eta \\nabla_\\theta (-J)', note: '形式上和监督学习一致，$-J$ 就是「负 loss」。' },
        { label: '本例', math: '\\eta = ' + lr, note: '学习率 0.5。' }
      ]
    },
    tip: 'RL 最大化 return，所以是 $+$ 梯度方向（梯度上升）。监督学习最小化 loss，所以是 $-$ 梯度方向（梯度下降）。本质是同一件事，只是符号约定。'
  },

  // 8. 验证
  {
    title: '验证：$\\pi(a)$ 上升',
    desc: '用新参数 $\\theta^{\\text{new}}$ 重新前向算 $\\pi$，看选中 action 的概率是否上升、目标 $J$ 是否上升。',
    formula: '\\pi^{\\text{new}} = \\text{softmax}(\\theta^{\\text{new}})',
    matrix: () =>
      '<div class="matrix-row">' +
        blk('训练前 $\\pi$', '$\\pi^{\\text{old}}$', vec(piBefore, { chosenIdx: ACTION_TOK })) +
        op('θ 更新后重算') +
        blk('训练后 $\\pi$', '$\\pi^{\\text{new}}$', vec(piAfter, { chosenIdx: ACTION_TOK })) +
      '</div>' +
      '<div class="compare">' +
        '<div class="compare-card before"><div class="label">训练前 $\\pi(a)$</div><div class="value">' + f(piBefore[ACTION_TOK]) + '</div></div>' +
        '<div class="compare-card after"><div class="label">训练后 $\\pi(a)$</div><div class="value">' + f(piAfter[ACTION_TOK]) + '</div></div>' +
      '</div>' +
      '<div style="margin-top:14px;">' +
        calc('$\\pi^{\\text{new}} = [' + piAfter.map(v => f(v)).join(', ') + ']$') +
        calc('$\\pi(a) = ' + f(piBefore[ACTION_TOK]) + ' \\to ' + f(piAfter[ACTION_TOK]) + '$', '', '升 ✓') +
        calc('$\\log \\pi(a) = ' + f(logPiBefore) + ' \\to ' + f(logPiAfter) + '$', '', '升 ✓') +
        calc('$J = G \\cdot \\log \\pi = ' + f(JBefore) + ' \\to ' + f(JAfter) + '$', '', '升 ✓') +
      '</div>' +
      '<div style="margin-top:10px;">' +
        calc('对比：其他 action 概率都降了（softmax 和为 1）') +
        calc('$\\pi(\\text{hello}) = ' + f(piBefore[0]) + ' \\to ' + f(piAfter[0]) + '$') +
        calc('$\\pi(\\text{there}) = ' + f(piBefore[2]) + ' \\to ' + f(piAfter[2]) + '$') +
        calc('$\\pi(\\text{bye}) = ' + f(piBefore[3]) + ' \\to ' + f(piAfter[3]) + '$') +
      '</div>',
    deriv: null,
    tip: '选中 action 概率从 0.3516 升到 0.4559，其他 action 概率都降了。PG 学会「在 $s$ 下更倾向选 hi」。'
  }
];

// === 翻页逻辑 ===
let current = 0;
const TOTAL = STAGES.length;

function renderStage(idx) {
  const s = STAGES[idx];
  renderMixed(document.getElementById('sTitle'), s.title);
  renderMixed(document.getElementById('sDesc'), s.desc);
  renderDisplay(document.getElementById('sFormula'), s.formula);

  const mArea = document.getElementById('mArea');
  if (s.matrix) {
    mArea.style.display = '';
    mArea.innerHTML = s.matrix();
    scanAndRender(mArea);
  } else {
    mArea.style.display = 'none';
  }

  const derivBox = document.getElementById('derivBox');
  if (s.deriv) {
    derivBox.style.display = '';
    renderMixed(document.getElementById('dTitle'), s.deriv.title);
    const steps = s.deriv.steps.map(step => {
      const stepDiv = document.createElement('div');
      stepDiv.className = 'deriv-step';
      const labelDiv = document.createElement('div');
      labelDiv.className = 'deriv-label';
      renderMixed(labelDiv, step.label);
      const mathDiv = document.createElement('div');
      mathDiv.style.margin = '4px 0';
      renderDisplay(mathDiv, step.math);
      const noteDiv = document.createElement('div');
      noteDiv.className = 'deriv-note';
      renderMixed(noteDiv, step.note);
      stepDiv.appendChild(labelDiv);
      stepDiv.appendChild(mathDiv);
      stepDiv.appendChild(noteDiv);
      return stepDiv;
    });
    const dSteps = document.getElementById('dSteps');
    dSteps.innerHTML = '';
    steps.forEach(s => dSteps.appendChild(s));
  } else {
    derivBox.style.display = 'none';
  }

  const tipBox = document.getElementById('tipBox');
  if (s.tip) {
    tipBox.style.display = '';
    renderMixed(tipBox, s.tip);
  } else {
    tipBox.style.display = 'none';
  }

  document.getElementById('cur').textContent = idx + 1;
  document.getElementById('tot').textContent = TOTAL;
  document.getElementById('prevBtn').disabled = idx === 0;
  document.getElementById('nextBtn').disabled = idx === TOTAL - 1;
}

function change(delta) {
  const next = current + delta;
  if (next < 0 || next >= TOTAL) return;
  current = next;
  renderStage(current);
}

// 键盘翻页
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') { change(-1); e.preventDefault(); }
  if (e.key === 'ArrowRight') { change(1); e.preventDefault(); }
});

// === 初始化 ===
renderConventions();
renderMixed(
  document.getElementById('subtitle'),
  'Policy Gradient 在状态 $s$ 下采样 $a$，让 $G$ 大的 $a$ 概率上升'
);
renderStage(0);
</script>
