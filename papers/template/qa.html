<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>方法名：常见问答</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"
    onload="renderMathInElement(document.body, {
      delimiters: [
        {left: '$$', right: '$$', display: true},
        {left: '$', right: '$', display: false}
      ],
      throwOnError: false
    });"></script>
  <style>
    :root {
      --font-body: Charter, 'Bitstream Charter', 'Sitka Text', Cambria, Georgia, serif;
      --font-ui: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --font-mono: 'SF Mono', Monaco, Menlo, Consolas, monospace;

      --fs-title: 36px;
      --fs-h1: 22px;
      --fs-h2: 18px;
      --fs-body: 17px;
      --fs-small: 14px;

      --lh-tight: 1.3;
      --lh-body: 1.7;

      --text: rgba(0, 0, 0, 0.88);
      --text-light: rgba(0, 0, 0, 0.6);
      --text-muted: rgba(0, 0, 0, 0.4);

      --bg: #ffffff;
      --bg-soft: #fafafa;
      --bg-code: #f6f8fa;

      --border: rgba(0, 0, 0, 0.1);
      --border-light: rgba(0, 0, 0, 0.05);

      --blue: #0969da;
      --red: #cf222e;
      --green: #1a7f37;
      --yellow: #9a6700;
      --purple: #8250df;

      --max-width: 960px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --text: rgba(255, 255, 255, 0.88);
        --text-light: rgba(255, 255, 255, 0.6);
        --text-muted: rgba(255, 255, 255, 0.4);
        --bg: #0d1117;
        --bg-soft: #161b22;
        --bg-code: #1c2128;
        --border: rgba(255, 255, 255, 0.12);
        --border-light: rgba(255, 255, 255, 0.06);
        --blue: #58a6ff;
        --red: #f85149;
        --green: #3fb950;
        --yellow: #d29922;
        --purple: #bc8cff;
      }
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      max-width: var(--max-width);
      margin: 0 auto;
      padding: 4rem 1.5rem 6rem;
      font-family: var(--font-body);
      font-size: var(--fs-body);
      line-height: var(--lh-body);
      color: var(--text);
      background: var(--bg);
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    .progress-bar {
      position: fixed; top: 0; left: 0;
      height: 2px; width: 0;
      background: var(--blue);
      z-index: 1000; transition: width 0.05s linear;
    }

    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(255, 255, 255, 0.72);
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
      border-bottom: 1px solid var(--border-light);
      padding: 0.7em 1.5em;
    }
    @media (prefers-color-scheme: dark) {
      .nav { background: rgba(13, 17, 23, 0.72); }
    }
    .nav-inner {
      max-width: var(--max-width); margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
      font-family: var(--font-ui);
      font-size: var(--fs-small);
    }
    .nav-brand {
      color: var(--text); text-decoration: none;
      font-weight: 500;
      border-bottom: none;
    }
    .nav-brand:hover { color: var(--blue); }
    .nav-links { display: flex; gap: 1.5em; }
    .nav-links a {
      color: var(--text-light); text-decoration: none;
      border-bottom: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--blue); }

    h1.title {
      font-family: var(--font-ui);
      font-size: var(--fs-title);
      font-weight: 700;
      line-height: var(--lh-tight);
      letter-spacing: -0.02em;
      margin: 0 0 1.5rem;
    }

    h1 {
      font-family: var(--font-ui);
      font-size: var(--fs-h1);
      font-weight: 600;
      line-height: var(--lh-tight);
      margin: 2.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }

    h2 {
      font-family: var(--font-ui);
      font-size: var(--fs-h2);
      font-weight: 600;
      margin: 2rem 0 0.8rem;
      color: var(--text);
    }

    p { margin: 0 0 1.2rem; }
    p:last-child { margin-bottom: 0; }
    strong, b { font-weight: 600; color: var(--text); }
    em, i { font-style: italic; }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.2s;
    }
    a:hover { border-bottom-color: var(--text); }

    ul, ol { padding-left: 1.5rem; margin: 0 0 1.2rem; }
    li { margin-bottom: 0.4rem; }
    li:last-child { margin-bottom: 0; }

    .callout {
      padding: 1.2rem 1.5rem;
      margin: 2rem 0;
      border-left: 3px solid var(--blue);
      color: var(--text-light);
    }
    .callout p:first-child { margin-top: 0; }
    .callout p:last-child { margin-bottom: 0; }
    .callout b { color: var(--text); }
    .callout-red { border-left-color: var(--red); }
    .callout-yellow { border-left-color: var(--yellow); }
    .callout-green { border-left-color: var(--green); }

    .text-red { color: var(--red); }
    .text-green { color: var(--green); }
    .text-blue { color: var(--blue); }
    .text-yellow { color: var(--yellow); }
    .text-purple { color: var(--purple); }

    blockquote {
      border-left: 2px solid var(--border);
      padding: 0.5rem 0 0.5rem 1.5rem;
      margin: 1.5rem 0;
      color: var(--text-light);
    }

    .table-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: 1.5rem 0;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      font-size: var(--fs-small);
      font-family: var(--font-ui);
    }
    thead { border-bottom: 1px solid var(--border); }
    th {
      text-align: left; font-weight: 600;
      padding: 0.5rem 0.8rem 0.5rem 0;
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 0.5rem 0.8rem 0.5rem 0;
      border-bottom: 1px solid var(--border-light);
    }
    tr:last-child td { border-bottom: none; }

    .katex-display {
      margin: 1.5rem 0;
      overflow-x: auto; overflow-y: hidden;
    }
    .katex { font-size: 1.05em; }

    code {
      font-family: var(--font-mono);
      font-size: 0.88em;
      background: var(--bg-code);
      padding: 0.15em 0.4em;
      border-radius: 3px;
    }
    pre {
      font-family: var(--font-mono);
      background: var(--bg-code);
      padding: 1rem 1.2rem;
      border-radius: 6px;
      overflow-x: auto;
      margin: 1.5rem 0;
      font-size: var(--fs-small);
      line-height: 1.5;
    }
    pre code { background: none; padding: 0; }

    /* Q&A 卡片 */
    .q-entry {
      margin: 2.5rem 0;
      padding-left: 1.5rem;
      border-left: 2px solid var(--border);
    }
    .q-entry h1 {
      margin-top: 0;
      border-bottom: none;
      padding-bottom: 0;
      font-size: var(--fs-h1);
      color: var(--text);
    }

    .back-to-top {
      position: fixed;
      bottom: 2rem; right: 2rem;
      width: 38px; height: 38px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 50%;
      cursor: pointer;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s, transform 0.2s;
      font-family: var(--font-ui);
      font-size: 1.1em;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
    }
    .back-to-top.visible { opacity: 1; pointer-events: auto; }
    .back-to-top:hover { transform: translateY(-2px); border-color: var(--text); }

    /* ============ 暗/亮模式切换 ============ */
    .theme-toggle {
      background: none; border: 1px solid var(--border);
      color: var(--text-light);
      width: 32px; height: 32px;
      border-radius: 50%; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      transition: all 0.2s; font-size: 1em; line-height: 1; padding: 0;
    }
    .theme-toggle:hover { color: var(--text); border-color: var(--text); }
    .theme-toggle .icon-sun { display: none; }
    .theme-toggle .icon-moon { display: block; }
    html[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
    html[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

    /* ============ 图片 lightbox ============ */
    .lightbox {
      position: fixed; inset: 0;
      background: rgba(0, 0, 0, 0.92);
      display: none; align-items: center; justify-content: center;
      z-index: 2000; cursor: zoom-out; padding: 2rem;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 95%; max-height: 95vh; margin: 0;
      box-shadow: 0 10px 40px rgba(0,0,0,0.5); border-radius: 4px;
    }
    .lightbox-caption {
      position: absolute; bottom: 1.5rem; left: 0; right: 0;
      text-align: center; color: rgba(255,255,255,0.8);
      font-family: var(--font-ui); font-size: 14px; padding: 0 1rem;
    }
    .article-image { cursor: zoom-in; transition: opacity 0.2s; }
    .article-image:hover { opacity: 0.92; }

    /* ============ 代码块复制按钮 ============ */
    .code-block { position: relative; }
    .copy-btn {
      position: absolute; top: 0.6rem; right: 0.6rem;
      background: var(--bg); color: var(--text-light);
      border: 1px solid var(--border);
      border-radius: 4px; padding: 0.25rem 0.6rem;
      font-family: var(--font-ui); font-size: 11px;
      cursor: pointer; opacity: 0;
      transition: opacity 0.2s, color 0.2s;
    }
    .code-block:hover .copy-btn { opacity: 1; }
    .copy-btn:hover { color: var(--text); border-color: var(--text); }
    .copy-btn.copied {
      color: var(--green); border-color: var(--green); opacity: 1;
    }

    @media (max-width: 768px) {
      :root {
        --fs-title: 28px;
        --fs-h1: 20px;
        --fs-h2: 17px;
        --fs-body: 16px;
      }
      body { padding: 3.5rem 1.2rem 4rem; }
      .nav-inner { font-size: 13px; }
      .q-entry { padding-left: 1rem; }
      .copy-btn { opacity: 1; }
    }

    @media print {
      .nav, .back-to-top, .progress-bar { display: none; }
      body { padding: 0; max-width: none; font-size: 11pt; }
      a { color: var(--text); border-bottom: none; }
    }
  </style>
</head>
<body>

<div class="progress-bar" id="progress"></div>

<nav class="nav">
  <div class="nav-inner">
    <a href="index.html" class="nav-brand">← 返回主文档</a>
    <div class="nav-links">
      <a href="paper.pdf">论文原文</a>
      <button class="theme-toggle" id="themeToggle" aria-label="切换主题">
        <span class="icon-moon">◐</span>
        <span class="icon-sun">☀</span>
      </button>
    </div>
  </div>
</nav>

<div class="lightbox" id="lightbox">
  <img id="lightboxImg" src="" alt="">
  <div class="lightbox-caption" id="lightboxCaption"></div>
</div>

<h1 class="title">方法名：常见问答</h1>

<div class="callout">
<p>记录读 <a href="index.html">主文档</a> 时的常见疑问与解答。</p>
</div>

<div class="q-entry">
<h1>Q1：<重写后的问题></h1>
<p>回答段...</p>
<h2><子主题></h2>
<p>...</p>
</div>

<div class="q-entry">
<h1>Q2：<重写后的问题></h1>
<p>回答段...</p>
</div>

<button class="back-to-top" id="backToTop" aria-label="返回顶部">↑</button>

<script>
// ============ 进度条 + 返回顶部 ============
const progressBar = document.getElementById('progress');
const backToTop = document.getElementById('backToTop');
window.addEventListener('scroll', () => {
  const h = document.documentElement;
  const scrolled = (h.scrollTop / (h.scrollHeight - h.clientHeight)) * 100;
  progressBar.style.width = scrolled + '%';
  backToTop.classList.toggle('visible', h.scrollTop > 400);
});
backToTop.addEventListener('click', () => {
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

// ============ 暗/亮模式切换（带 localStorage 持久化）============
const themeToggle = document.getElementById('themeToggle');
const savedTheme = localStorage.getItem('theme') ||
  (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
document.documentElement.setAttribute('data-theme', savedTheme);
themeToggle.addEventListener('click', () => {
  const current = document.documentElement.getAttribute('data-theme');
  const next = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});

// ============ 图片点击放大 ============
const lightbox = document.getElementById('lightbox');
const lightboxImg = document.getElementById('lightboxImg');
const lightboxCaption = document.getElementById('lightboxCaption');

document.querySelectorAll('body > img, .q-entry img, p ~ img').forEach(img => {
  if (img.id === 'lightboxImg') return;
  img.classList.add('article-image');
  img.addEventListener('click', () => {
    lightboxImg.src = img.src;
    lightboxCaption.textContent = img.alt || '';
    lightbox.classList.add('open');
  });
});
lightbox.addEventListener('click', () => lightbox.classList.remove('open'));
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') lightbox.classList.remove('open');
});

// ============ 代码块复制按钮 ============
document.querySelectorAll('.code-block pre').forEach(pre => {
  const btn = document.createElement('button');
  btn.className = 'copy-btn';
  btn.textContent = '复制';
  btn.addEventListener('click', async () => {
    const code = pre.querySelector('code') ? pre.querySelector('code').innerText : pre.innerText;
    try {
      await navigator.clipboard.writeText(code);
    } catch (err) {
      const textarea = document.createElement('textarea');
      textarea.value = code;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand('copy');
      document.body.removeChild(textarea);
    }
    btn.textContent = '已复制 ✓';
    btn.classList.add('copied');
    setTimeout(() => {
      btn.textContent = '复制';
      btn.classList.remove('copied');
    }, 1500);
  });
  pre.parentElement.appendChild(btn);
});
</script>

</body>
</html>
